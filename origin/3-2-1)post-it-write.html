<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편지 글쓰기 — 녹차 우편함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3F1;
    --surface: #FFFFFF;
    --surface-2: #EDEAE7;
    --primary: #9686BF;
    --primary-tint: rgba(150,134,191,0.10);
    --primary-mid: rgba(150,134,191,0.22);
    --primary-shadow: rgba(150,134,191,0.16);
    --divider: #EAE7E3;
    --text-primary: #1C1A1F;
    --text-secondary: #6B6670;
    --text-muted: #ADA8B2;
    --danger: #BF9696;
    --amber: #C4885A;
    --green: #8BBFA8;
  }

  html, body { width: 100%; min-height: 100vh; }

  body {
    font-family: 'Nanum Square Neo', sans-serif;
    background: #16141a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 0 40px;
    -webkit-text-size-adjust: 100%;
  }

  .phone-shell {
    width: 390px;
    background: var(--bg);
    border-radius: 48px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 40px 100px rgba(0,0,0,0.65);
    display: flex; flex-direction: column;
    position: relative;
    height: 844px;
  }

  .dynamic-island {
    position: absolute; top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000; border-radius: 20px; z-index: 20;
  }

  /* ── Status bar ── */
  .status-bar {
    background: var(--bg);
    padding: 56px 24px 0;
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 800; color: var(--text-primary); }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* ── Screen ── */
  .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top nav ── */
  .top-nav {
    padding: 12px 20px 10px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }
  .nav-left { display: flex; align-items: center; gap: 10px; }
  .nav-back {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface-2); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .nav-back:active { background: #D6D3CF; }
  .nav-title { font-size: 15px; font-weight: 800; color: var(--text-primary); }
  .char-badge {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    background: var(--surface-2); border-radius: 20px; padding: 4px 10px;
    transition: color 0.15s;
  }
  .char-badge.warn { color: var(--amber); }
  .char-badge.over { color: var(--danger); }

  /* ── Scroll area ── */
  .scroll-area {
    flex: 1; overflow-y: auto; scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 0;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── 내 정보 카드 ── */
  .sender-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 3px 12px var(--primary-shadow);
    margin-bottom: 14px;
    animation: fadeUp 0.35s ease 0.05s both;
  }
  .sender-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    flex-shrink: 0; position: relative;
  }
  .sender-info { flex: 1; min-width: 0; }
  .sender-nick {
    font-size: 14px; font-weight: 800; color: var(--text-primary);
    letter-spacing: -0.2px;
    display: flex; align-items: center; gap: 6px;
  }
  .age-pill {
    font-size: 10px; font-weight: 700; color: var(--primary);
    background: var(--primary-tint); border-radius: 20px; padding: 1px 7px;
  }
  .sender-loc {
    font-size: 11.5px; font-weight: 400; color: var(--text-muted);
    display: flex; align-items: center; gap: 3px; margin-top: 2px;
  }

  /* 익명 토글 (인라인) */
  .anon-inline {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .anon-label { font-size: 11px; font-weight: 700; color: var(--text-muted); }
  .toggle-input { display: none; }
  .toggle-track {
    width: 36px; height: 20px; border-radius: 10px;
    background: var(--surface-2); cursor: pointer;
    position: relative; transition: background 0.25s;
    flex-shrink: 0;
  }
  .toggle-input:checked + .toggle-track { background: var(--primary); }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    transition: transform 0.25s;
  }
  .toggle-input:checked + .toggle-track .toggle-thumb { transform: translateX(16px); }

  /* ── 편지지 카드 ── */
  .letter-card {
    background: var(--surface);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 4px 18px var(--primary-shadow);
    margin-bottom: 14px;
    border: 1.5px solid transparent;
    transition: border-color 0.18s;
    animation: fadeUp 0.35s ease 0.08s both;
  }
  .letter-card:focus-within { border-color: var(--primary); }

  /* 편지 상단 장식 */
  .letter-header {
    background: var(--primary-mid);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .letter-header-left { display: flex; align-items: center; gap: 8px; }
  .stamp {
    width: 34px; height: 42px;
    background: var(--surface); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    outline: 2px dashed rgba(150,134,191,0.3);
    outline-offset: 2px;
  }
  .letter-header-title {
    font-size: 11px; font-weight: 800; color: var(--primary);
    letter-spacing: 0.5px;
  }
  .letter-header-sub {
    font-size: 9.5px; font-weight: 400; color: rgba(150,134,191,0.7);
    margin-top: 1px;
  }
  .postmark {
    display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
  }
  .postmark-text { font-size: 9px; font-weight: 700; color: rgba(150,134,191,0.55); letter-spacing: 0.6px; }
  .postmark-lines { display: flex; gap: 3px; }
  .postmark-line { width: 16px; height: 1.5px; background: rgba(150,134,191,0.3); border-radius: 1px; }

  /* 제목 입력 */
  .title-wrap {
    padding: 14px 18px 0;
    border-bottom: 1px solid var(--divider);
    padding-bottom: 12px;
  }
  .title-input {
    width: 100%; border: none; outline: none; background: transparent;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 16px; font-weight: 800; color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .title-input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 15px; }

  /* 본문 영역 — 편지지 줄 배경 */
  .body-wrap {
    padding: 14px 18px 18px;
    background-image: repeating-linear-gradient(
      transparent, transparent 27px,
      rgba(150,134,191,0.07) 27px, rgba(150,134,191,0.07) 28px
    );
    background-position: 0 14px;
  }
  .body-textarea {
    width: 100%; border: none; outline: none; background: transparent;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 14px; font-weight: 400; color: var(--text-primary);
    line-height: 28px; resize: none; min-height: 200px;
  }
  .body-textarea::placeholder {
    color: var(--text-muted); font-size: 13px; line-height: 1.75;
  }

  /* 편지지 하단 서명 */
  .letter-footer {
    padding: 10px 18px 14px;
    border-top: 1px dashed rgba(150,134,191,0.2);
    display: flex; justify-content: flex-end; align-items: center; gap: 5px;
  }
  .sign-from { font-size: 11.5px; font-weight: 400; color: var(--text-muted); }
  .sign-nick  { font-size: 12.5px; font-weight: 800; color: var(--primary); }

  /* ── 태그 선택 ── */
  .tag-section {
    animation: fadeUp 0.35s ease 0.12s both;
    margin-bottom: 14px;
  }
  .tag-section-label {
    font-size: 10.5px; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 9px; padding-left: 2px;
  }
  .tag-scroll {
    display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tag-scroll::-webkit-scrollbar { display: none; }
  .tag-btn {
    flex-shrink: 0;
    background: var(--surface); border: 1.5px solid transparent;
    border-radius: 20px; padding: 6px 14px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 12px; font-weight: 700; color: var(--text-secondary);
    cursor: pointer; white-space: nowrap;
    box-shadow: 0 2px 6px var(--primary-shadow);
    transition: all 0.15s;
  }
  .tag-btn.selected {
    border-color: var(--primary); background: var(--primary-tint); color: var(--primary);
  }
  .tag-btn:active { transform: scale(0.94); }

  /* ── 공개 범위 ── */
  .scope-section {
    animation: fadeUp 0.35s ease 0.15s both;
    margin-bottom: 14px;
  }
  .scope-row { display: flex; gap: 8px; }
  .scope-btn {
    flex: 1; background: var(--surface);
    border: 1.5px solid transparent; border-radius: 13px;
    padding: 11px 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-family: 'Nanum Square Neo', sans-serif;
    box-shadow: 0 2px 6px var(--primary-shadow); transition: all 0.15s;
  }
  .scope-btn.selected { border-color: var(--primary); background: var(--primary-tint); }
  .scope-btn:active { transform: scale(0.95); }
  .scope-icon { font-size: 16px; line-height: 1; }
  .scope-name { font-size: 11.5px; font-weight: 800; color: var(--text-primary); }
  .scope-btn.selected .scope-name { color: var(--primary); }
  .scope-desc { font-size: 9.5px; font-weight: 400; color: var(--text-muted); text-align: center; line-height: 1.4; }

  /* ── 안내 카드 ── */
  .notice-card {
    background: var(--primary-tint);
    border-radius: 13px; padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 14px;
    animation: fadeUp 0.35s ease 0.18s both;
  }
  .notice-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--primary-mid);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  }
  .notice-text { font-size: 11.5px; font-weight: 400; color: var(--text-secondary); line-height: 1.65; word-break: keep-all; }
  .notice-text strong { color: var(--primary); font-weight: 700; }

  /* ── 전송 버튼 ── */
  .send-bar {
    flex-shrink: 0; padding: 12px 16px 18px;
    background: var(--bg); border-top: 1px solid var(--divider);
  }
  .send-btn {
    width: 100%; background: #E8E5E1; color: #B0ABB5;
    border: none; border-radius: 14px; padding: 16px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 15px; font-weight: 800;
    cursor: default;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.22s, color 0.22s, transform 0.12s, box-shadow 0.22s;
  }
  .send-btn.active { background: var(--primary); color: #fff; cursor: pointer; }
  .send-btn.active:hover { box-shadow: 0 8px 24px rgba(150,134,191,0.30); transform: translateY(-1px); }
  .send-btn.active:active { transform: scale(0.98); box-shadow: none; }

  .space { height: 8px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="phone-shell">
  <div class="dynamic-island"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" fill="none" viewBox="0 0 17 12">
        <rect x="0"    y="3"   width="3" height="9"    rx="1" fill="#1C1A1F" opacity=".3"/>
        <rect x="4.5"  y="2"   width="3" height="10"   rx="1" fill="#1C1A1F" opacity=".5"/>
        <rect x="9"    y="0.5" width="3" height="11.5" rx="1" fill="#1C1A1F" opacity=".75"/>
        <rect x="13.5" y="0"   width="3" height="12"   rx="1" fill="#1C1A1F"/>
      </svg>
      <svg width="16" height="12" fill="none" viewBox="0 0 16 12">
        <path d="M8 3C10.2 3 12.2 3.9 13.6 5.4L15 4C13.2 2.1 10.7 1 8 1C5.3 1 2.8 2.1 1 4L2.4 5.4C3.8 3.9 5.8 3 8 3Z" fill="#1C1A1F"/>
        <path d="M8 6C9.5 6 10.8 6.6 11.8 7.6L13.2 6.2C11.8 4.8 9.9 4 8 4C6.1 4 4.2 4.8 2.8 6.2L4.2 7.6C5.2 6.6 6.5 6 8 6Z" fill="#1C1A1F" opacity=".6"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#1C1A1F"/>
      </svg>
      <svg width="27" height="13" fill="none" viewBox="0 0 27 13">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#1C1A1F" stroke-opacity=".3"/>
        <rect x="2"   y="2"   width="18" height="9"  rx="2"   fill="#1C1A1F"/>
        <path d="M24.5 4.5v4C25.6 8 26.5 7.1 26.5 6.5S25.6 5 24.5 4.5Z" fill="#1C1A1F" opacity=".35"/>
      </svg>
    </div>
  </div>

  <div class="screen">
    <!-- Top nav -->
    <div class="top-nav">
      <div class="nav-left">
        <button class="nav-back" onclick="history.back()">
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path d="M10 13L5.5 8L10 3" stroke="#1C1A1F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="nav-title">편지 글쓰기</span>
      </div>
      <span class="char-badge" id="char-badge">0 / 500</span>
    </div>

    <!-- Scroll -->
    <div class="scroll-area">

      <!-- 내 정보 -->
      <div class="sender-card">
        <div class="sender-avatar" id="my-avatar">나</div>
        <div class="sender-info">
          <div class="sender-nick">
            <span id="my-nick">졸린고양이🐱</span>
            <span class="age-pill">25</span>
          </div>
          <div class="sender-loc">
            <svg width="9" height="11" fill="none" viewBox="0 0 10 12">
              <path d="M5 1C3.1 1 1.5 2.6 1.5 4.5C1.5 7 5 11 5 11S8.5 7 8.5 4.5C8.5 2.6 6.9 1 5 1Z" stroke="#ADA8B2" stroke-width="1.1"/>
              <circle cx="5" cy="4.5" r="1.1" fill="#ADA8B2"/>
            </svg>
            <span id="my-loc">서울 강남구</span>
          </div>
        </div>
        <!-- 익명 토글 -->
        <div class="anon-inline">
          <span class="anon-label">익명</span>
          <input type="checkbox" class="toggle-input" id="anon-toggle" onchange="onAnonChange()">
          <label class="toggle-track" for="anon-toggle">
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>

      <!-- 편지지 카드 -->
      <div class="letter-card" id="letter-card">

        <!-- 편지 헤더 장식 -->
        <div class="letter-header">
          <div class="letter-header-left">
            <div class="stamp" id="stamp">✉️</div>
            <div>
              <p class="letter-header-title">녹차 우편함</p>
              <p class="letter-header-sub">전체 공개 편지</p>
            </div>
          </div>
          <div class="postmark">
            <span class="postmark-text" id="post-date">2026. 04. 06</span>
            <span class="postmark-text">서울 강남구</span>
            <div class="postmark-lines">
              <div class="postmark-line"></div>
              <div class="postmark-line"></div>
              <div class="postmark-line"></div>
            </div>
          </div>
        </div>

        <!-- 제목 -->
        <div class="title-wrap">
          <input type="text" class="title-input" id="title-input"
            placeholder="제목을 입력하세요"
            maxlength="40"
            oninput="checkReady()"/>
        </div>

        <!-- 본문 -->
        <div class="body-wrap">
          <textarea class="body-textarea" id="body-textarea"
            placeholder="우편함을 보는 누군가에게&#10;하고 싶은 말을 자유롭게 써보세요.&#10;&#10;따뜻한 안부, 공감 가는 이야기,&#10;혹은 그냥 오늘 하루도 괜찮았나요? ☁️"
            maxlength="500"
            oninput="onBodyInput(this)"></textarea>
        </div>

        <!-- 서명 -->
        <div class="letter-footer">
          <span class="sign-from">from.</span>
          <span class="sign-nick" id="sign-nick">졸린고양이🐱</span>
        </div>

      </div>

      <!-- 태그 -->
      <div class="tag-section">
        <p class="tag-section-label">분위기 태그</p>
        <div class="tag-scroll">
          <button class="tag-btn selected" onclick="selectTag(this)" data-stamp="✉️">✉️ 일상</button>
          <button class="tag-btn" onclick="selectTag(this)" data-stamp="💛">💛 따뜻해요</button>
          <button class="tag-btn" onclick="selectTag(this)" data-stamp="🌿">🌿 담백해요</button>
          <button class="tag-btn" onclick="selectTag(this)" data-stamp="🌙">🌙 감성적이에요</button>
          <button class="tag-btn" onclick="selectTag(this)" data-stamp="🤔">🤔 고민이에요</button>
          <button class="tag-btn" onclick="selectTag(this)" data-stamp="🎉">🎉 신나요</button>
          <button class="tag-btn" onclick="selectTag(this)" data-stamp="💜">💜 그냥요</button>
        </div>
      </div>

      <!-- 공개 범위 -->
      <div class="scope-section">
        <p class="tag-section-label">공개 범위</p>
        <div class="scope-row">
          <button class="scope-btn selected" data-scope="동네" onclick="selectScope(this)">
            <span class="scope-icon">📍</span>
            <span class="scope-name">내 동네</span>
            <span class="scope-desc">강남구</span>
          </button>
          <button class="scope-btn" data-scope="서울" onclick="selectScope(this)">
            <span class="scope-icon">🏙️</span>
            <span class="scope-name">서울</span>
            <span class="scope-desc">서울 전체</span>
          </button>
          <button class="scope-btn" data-scope="전국" onclick="selectScope(this)">
            <span class="scope-icon">🗺️</span>
            <span class="scope-name">전국</span>
            <span class="scope-desc">모든 지역</span>
          </button>
        </div>
      </div>

      <!-- 안내 -->
      <div class="notice-card">
        <div class="notice-dot">
          <svg width="9" height="9" fill="none" viewBox="0 0 9 9">
            <path d="M4.5 2V4.5M4.5 6.5V6.6" stroke="#9686BF" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="notice-text">
          게시된 편지는 <strong>우편함 게시판</strong>에 공개됩니다.<br>
          욕설·혐오 표현은 제재될 수 있어요. 누구나 좋아요와 답장을 보낼 수 있습니다.
        </p>
      </div>

      <div class="space"></div>
    </div>

    <!-- 전송 버튼 -->
    <div class="send-bar">
      <button class="send-btn" id="send-btn" onclick="postLetter()">
        <svg width="16" height="14" fill="none" viewBox="0 0 17 15">
          <path d="M1 1L16 7.5L1 14V9L11 7.5L1 6V1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        우편함에 게시하기
      </button>
    </div>
  </div>

  <!-- Home indicator -->
  <div style="background:var(--bg);padding:0 0 10px;display:flex;justify-content:center;flex-shrink:0;">
    <div style="width:130px;height:4px;background:var(--text-primary);border-radius:3px;opacity:0.15;"></div>
  </div>
</div>

<script>
  const MY_NICK = '졸린고양이🐱';
  const MY_LOC  = '서울 강남구';
  let isAnon = false;

  /* 오늘 날짜 */
  const today = new Date();
  document.getElementById('post-date').textContent =
    today.getFullYear() + '. ' +
    String(today.getMonth()+1).padStart(2,'0') + '. ' +
    String(today.getDate()).padStart(2,'0');

  /* ── 본문 입력 ── */
  function onBodyInput(el) {
    const len = el.value.length;
    const badge = document.getElementById('char-badge');
    badge.textContent = len + ' / 500';
    badge.classList.toggle('warn', len >= 400 && len < 470);
    badge.classList.toggle('over', len >= 470);
    checkReady();
  }

  /* ── 게시 버튼 활성화 ── */
  function checkReady() {
    const title = document.getElementById('title-input').value.trim();
    const body  = document.getElementById('body-textarea').value.trim();
    const btn   = document.getElementById('send-btn');
    btn.classList.toggle('active', title.length > 0 && body.length >= 5);
  }

  /* ── 익명 토글 ── */
  function onAnonChange() {
    isAnon = document.getElementById('anon-toggle').checked;
    const nick = isAnon ? '익명' : MY_NICK;
    const loc  = isAnon ? '비공개' : MY_LOC;
    document.getElementById('sign-nick').textContent = nick;
    document.getElementById('my-nick').textContent   = nick;
    document.getElementById('my-loc').textContent    = loc;
    document.getElementById('post-date') // postmark loc
      .nextElementSibling && (document.querySelectorAll('.postmark-text')[1].textContent = isAnon ? '비공개' : MY_LOC);
  }

  /* ── 태그 선택 → 우표 변경 ── */
  function selectTag(btn) {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('stamp').textContent = btn.dataset.stamp || '✉️';
  }

  /* ── 공개 범위 ── */
  function selectScope(btn) {
    document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  /* ── 게시 ── */
  function postLetter() {
    const btn   = document.getElementById('send-btn');
    if (!btn.classList.contains('active')) return;

    btn.innerHTML = `
      <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M5 8.5L7.5 11L11 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      게시되었어요!`;
    btn.style.background = '#8BBFA8';
    btn.classList.remove('active');

    setTimeout(() => {
      alert('✉️ 편지가 우편함에 게시되었습니다!\n많은 사람들이 읽을 수 있어요.');
    }, 300);
  }
</script>
</body>
</html>
