<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우편함 전체보기 — 녹차</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F3F1;
  --surface: #FFFFFF;
  --surface-2: #EDEAE7;
  --primary: #9686BF;
  --primary-tint: rgba(150,134,191,0.10);
  --primary-mid: rgba(150,134,191,0.18);
  --primary-shadow: rgba(150,134,191,0.13);
  --divider: #EAE7E3;
  --text-primary: #1C1A1F;
  --text-secondary: #6B6670;
  --text-muted: #ADA8B2;
  --danger: #BF9696;
  --amber: #C4885A;
  --green: #8BBFA8;
}

html, body { width: 100%; min-height: 100vh; }

body {
  font-family: 'Nanum Square Neo', sans-serif;
  background: #16141a;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 24px 0 40px;
  -webkit-text-size-adjust: 100%;
}

.phone-shell {
  width: 390px; height: 844px;
  background: var(--bg);
  border-radius: 48px;
  /* NO overflow:hidden — 카드가 잘리는 원인이므로 제거 */
  box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 40px 100px rgba(0,0,0,0.65);
  display: flex; flex-direction: column; position: relative;
}

.dynamic-island {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 34px;
  background: #000; border-radius: 20px; z-index: 20;
  pointer-events: none;
}

/* ── Status bar ── */
.status-bar {
  background: var(--bg); border-radius: 48px 48px 0 0;
  padding: 56px 24px 0;
  display: flex; justify-content: space-between; align-items: flex-end;
  flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 800; color: var(--text-primary); }
.status-icons { display: flex; align-items: center; gap: 6px; }

/* ── Top nav ── */
.top-nav {
  padding: 12px 20px 10px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg); border-bottom: 1px solid var(--divider);
  flex-shrink: 0;
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-back {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface-2); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.nav-back:active { background: #D6D3CF; }
.nav-title { font-size: 15px; font-weight: 800; color: var(--text-primary); }
.nav-sub   { font-size: 10.5px; font-weight: 400; color: var(--text-muted); margin-top: 1px; }
.write-btn {
  background: var(--primary); color: #fff;
  border: none; border-radius: 20px; padding: 7px 14px;
  font-family: 'Nanum Square Neo', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  transition: opacity 0.15s, transform 0.12s;
}
.write-btn:active { transform: scale(0.95); }

/* ── Filter chips ── */
.filter-bar {
  padding: 10px 16px; display: flex; gap: 7px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--bg); flex-shrink: 0;
  border-bottom: 1px solid var(--divider);
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; background: var(--surface);
  border: 1.5px solid transparent; border-radius: 20px; padding: 5px 13px;
  font-family: 'Nanum Square Neo', sans-serif;
  font-size: 11.5px; font-weight: 700; color: var(--text-secondary);
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 1px 5px var(--primary-shadow); transition: all 0.15s;
}
.filter-chip.on { border-color: var(--primary); background: var(--primary-tint); color: var(--primary); }
.filter-chip:active { transform: scale(0.94); }

/* ── Scroll area ── */
.scroll-area {
  flex: 1; overflow-y: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding: 14px 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
  /* 하단 radius 확보 */
  border-radius: 0 0 48px 48px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ════════════════════════════════════
   편지 카드
   핵심: overflow 없음, border-radius는
   헤더/푸터에 각각 적용
════════════════════════════════════ */
.lcard {
  background: var(--surface);
  border-radius: 18px;
  box-shadow: 0 3px 16px var(--primary-shadow);
  animation: fadeUp 0.3s ease both;
  /* overflow:hidden 절대 사용 안 함 */
}
.lcard:active { opacity: 0.95; }

/* 봉투 헤더 — 상단만 radius */
.lcard-head {
  background: var(--primary-mid);
  border-radius: 18px 18px 0 0;
  padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.lcard-head-left { display: flex; align-items: center; gap: 9px; }
.stamp {
  width: 28px; height: 34px;
  background: var(--surface); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  outline: 2px dashed rgba(150,134,191,0.28); outline-offset: 2px;
}
.sender-nick {
  font-size: 12.5px; font-weight: 800; color: var(--text-primary);
  display: flex; align-items: center; gap: 5px;
}
.age-pill {
  font-size: 9px; font-weight: 700; color: var(--primary);
  background: rgba(150,134,191,0.18); border-radius: 20px; padding: 1px 6px;
}
.anon-pill {
  font-size: 9px; font-weight: 700; color: var(--text-muted);
  background: rgba(0,0,0,0.06); border-radius: 20px; padding: 1px 6px;
}
.sender-loc {
  font-size: 10px; font-weight: 400; color: rgba(150,134,191,0.65);
  display: flex; align-items: center; gap: 2px; margin-top: 1px;
}
.card-time {
  font-size: 10px; font-weight: 400; color: rgba(150,134,191,0.6); white-space: nowrap;
}

/* 본문 */
.lcard-body { padding: 14px 16px 10px; }
.lcard-title {
  font-size: 14px; font-weight: 800; color: var(--text-primary);
  letter-spacing: -0.3px; margin-bottom: 7px;
}
.lcard-text {
  font-size: 13px; font-weight: 400; color: var(--text-secondary);
  line-height: 1.7; word-break: keep-all;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.lcard-text.exp { -webkit-line-clamp: unset; overflow: visible; }
.more-btn {
  display: inline-block; margin-top: 5px;
  font-size: 11.5px; font-weight: 700; color: var(--primary);
  background: none; border: none; cursor: pointer; padding: 0;
  font-family: 'Nanum Square Neo', sans-serif;
}
.mood-tag {
  display: inline-flex; align-items: center; gap: 3px;
  margin-top: 10px;
  font-size: 10.5px; font-weight: 700; color: var(--primary);
  background: var(--primary-tint); border-radius: 20px; padding: 3px 9px;
}

/* 서명 */
.lcard-sign {
  padding: 9px 16px 9px;
  display: flex; justify-content: flex-end; align-items: center; gap: 4px;
  border-top: 1px dashed rgba(150,134,191,0.2);
  margin-top: 10px;
}
.sign-from { font-size: 11px; font-weight: 400; color: var(--text-muted); }
.sign-nick  { font-size: 12px; font-weight: 800; color: var(--primary); }

/* 액션바 — 하단만 radius */
.lcard-actions {
  border-top: 1px solid var(--divider);
  border-radius: 0 0 18px 18px;
  padding: 8px 14px 11px;
  display: flex; align-items: center;
  background: var(--surface);
}
/* 공개범위 — 왼쪽 */
.scope-pill {
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  background: var(--surface-2); border-radius: 10px; padding: 3px 9px;
  flex-shrink: 0;
}
/* 좋아요·답장 — 오른쪽 */
.action-right {
  margin-left: auto; display: flex; align-items: center; gap: 2px;
}
.like-btn, .reply-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 5px 9px;
  border-radius: 20px; flex-shrink: 0;
  font-family: 'Nanum Square Neo', sans-serif;
  font-size: 12px; font-weight: 700; color: var(--text-muted);
  transition: background 0.15s, color 0.15s, transform 0.1s;
}
.like-btn:hover  { background: var(--primary-tint); color: var(--primary); }
.reply-btn:hover { background: var(--primary-tint); color: var(--primary); }
.like-btn.liked  { color: var(--primary); background: var(--primary-tint); }
.like-btn:active, .reply-btn:active { transform: scale(0.93); }

/* ── FAB ── */
.fab {
  position: absolute; bottom: 72px; right: 20px;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--primary); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(150,134,191,0.45);
  transition: transform 0.15s; z-index: 10;
}
.fab:hover  { transform: translateY(-2px); }
.fab:active { transform: scale(0.92); }

/* ── Empty ── */
.empty {
  text-align: center; padding: 48px 24px;
  font-size: 14px; font-weight: 700; color: var(--text-muted);
}
.empty p:first-child { font-size: 36px; margin-bottom: 10px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="phone-shell">

<script>
const DATA = [
  { id:1, stamp:'💜', tag:'그냥요',      scope:'동네', anon:true,  nick:'익명',        age:null, loc:'강남구',     time:'방금 전', title:'오늘 하루도 수고했어요', likes:24, liked:false, replies:3,
    body:'오늘 지하철에서 힘들어 보이는 분이 계셨는데 말을 걸지 못했어요. 그 분도 오늘 하루 잘 마무리하셨으면 좋겠다고 생각했어요.\n\n그냥 지나가다 우연히 이 공간에 왔는데, 여기 계신 모든 분들도 오늘 하루 정말 수고하셨어요 🌙' },

  { id:4, stamp:'🌙', tag:'감성적이에요', scope:'전국', anon:false, nick:'별빛수집가✨',  age:26, loc:'경기 수원시', time:'1시간 전', title:'첫 월급 받았는데 아무것도 하기 싫다', likes:41, liked:true, replies:19,
    body:'드디어 첫 월급을 받았어요. 근데 이상하게 기쁘지가 않네요. 이런 감정 느껴보신 분 계세요?\n\n열심히 일했는데 왜 이렇게 텅 빈 기분인지... 그냥 어딘가에 적고 싶었어요.' },

];

const exp = new Set();
let cur = [...DATA];

/* ── 렌더 ── */
function render() {
  const list = document.getElementById('list');
  document.getElementById('cnt').textContent = cur.length;
  list.innerHTML = '';
  if (!cur.length) {
    list.innerHTML = '<div class="empty"><p>✉️</p><p>편지가 없어요. 첫 편지를 써보세요!</p></div>';
    return;
  }
  cur.forEach((l, i) => {
    const card = makeCard(l, i);
    list.appendChild(card);
  });
}

function makeCard(l, i) {
  const wrap = document.createElement('div');
  wrap.className = 'lcard';
  wrap.style.animationDelay = (i * 0.04) + 's';

  const isExp  = exp.has(l.id);
  const isLong = l.body.length > 90;
  const scopeLabel = l.scope === '동네' ? '📍 동네' : l.scope === '서울' ? '🏙️ 서울' : '🗺️ 전국';
  const nickHtml = l.anon
    ? `익명 <span class="anon-pill">비공개</span>`
    : `${x(l.nick)} <span class="age-pill">${l.age}</span>`;
  const signNick = l.anon ? '익명' : x(l.nick);
  const likedClass = l.liked ? ' liked' : '';
  const likedFill  = l.liked ? 'var(--primary)' : 'none';

  wrap.innerHTML =
    /* 헤더 */
    `<div class="lcard-head">
      <div class="lcard-head-left">
        <div class="stamp">${l.stamp}</div>
        <div>
          <div class="sender-nick">${nickHtml}</div>
          <div class="sender-loc">
            <svg width="8" height="9" fill="none" viewBox="0 0 10 12">
              <path d="M5 1C3.1 1 1.5 2.6 1.5 4.5C1.5 7 5 11 5 11S8.5 7 8.5 4.5C8.5 2.6 6.9 1 5 1Z" stroke="rgba(150,134,191,0.6)" stroke-width="1.2"/>
              <circle cx="5" cy="4.5" r="1.1" fill="rgba(150,134,191,0.6)"/>
            </svg>
            ${x(l.loc)}
          </div>
        </div>
      </div>
      <span class="card-time">${l.time}</span>
    </div>` +

    /* 본문 */
    `<div class="lcard-body">
      <p class="lcard-title">${x(l.title)}</p>
      <p class="lcard-text${isExp ? ' exp' : ''}" id="t${l.id}">${x(l.body).replace(/\n/g,'<br>')}</p>
      ${isLong ? `<button class="more-btn" onclick="toggle(event,${l.id})">${isExp ? '접기 ↑' : '더보기 ↓'}</button>` : ''}
      <div style="margin-top:10px;padding-bottom:4px;">
        <span class="mood-tag">${l.stamp} ${l.tag}</span>
      </div>
    </div>` +

    /* 서명 */
    `<div class="lcard-sign">
      <span class="sign-from">from.</span>
      <span class="sign-nick">${signNick}</span>
    </div>` +

    /* 액션바 */
    `<div class="lcard-actions">
      <span class="scope-pill">${scopeLabel}</span>
      <div class="action-right">
        <button class="like-btn${likedClass}" id="lb${l.id}" onclick="like(event,${l.id})">
          <svg width="14" height="13" fill="${likedFill}" viewBox="0 0 14 13">
            <path d="M7 12S1 8.3 1 4.5C1 2.5 2.5 1 4.3 1c.9 0 2 .6 2.7 1.6C7.7 1.6 8.8 1 9.7 1 11.5 1 13 2.5 13 4.5 13 8.3 7 12 7 12Z" stroke="var(--primary)" stroke-width="1.3" stroke-linejoin="round"/>
          </svg>
          <span id="lc${l.id}">${l.likes}</span>
        </button>
        <button class="reply-btn" onclick="reply(event,${l.id},'${(l.anon?'익명':l.nick).replace(/'/g,"\\'")}')">
          <svg width="16" height="13" fill="none" viewBox="0 0 18 14">
            <rect x="1" y="1" width="16" height="12" rx="2.5" stroke="#ADA8B2" stroke-width="1.3"/>
            <path d="M1 3.5L9 8.5L17 3.5" stroke="#ADA8B2" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ${l.replies}
        </button>
      </div>
    </div>`;

  return wrap;
}

/* ── 좋아요 ── */
function like(e, id) {
  e.stopPropagation();
  const l = DATA.find(d => d.id === id);
  l.liked = !l.liked; l.likes += l.liked ? 1 : -1;
  const btn = document.getElementById('lb' + id);
  const cnt = document.getElementById('lc' + id);
  const path = btn.querySelector('path');
  btn.classList.toggle('liked', l.liked);
  path.setAttribute('fill', l.liked ? 'var(--primary)' : 'none');
  cnt.textContent = l.likes;
}

/* ── 더보기 ── */
function toggle(e, id) {
  e.stopPropagation();
  exp.has(id) ? exp.delete(id) : exp.add(id);
  render();
}

/* ── 답장 ── */
function reply(e, id, nick) {
  e.stopPropagation();
  alert('✉️ ' + nick + '님의 편지에 답장을 보냅니다.');
}

/* ── 필터 ── */
function setFilter(btn, tag) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  cur = tag === '전체' ? [...DATA] : DATA.filter(l => l.tag === tag);
  exp.clear();
  render();
}

/* ── XSS ── */
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

render();
</script>
</body>
</html>
