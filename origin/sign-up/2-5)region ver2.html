<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지역 설정 — 녹차</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3F1;
    --surface: #FFFFFF;
    --surface-2: #EDEAE7;
    --primary: #9686BF;
    --primary-tint: rgba(150,134,191,0.10);
    --divider: #EAE7E3;
    --text-primary: #1C1A1F;
    --text-secondary: #6B6670;
    --text-muted: #ADA8B2;
  }

  html, body { width: 100%; min-height: 100vh; }

  body {
    font-family: 'Nanum Square Neo', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 12px 60px;
    -webkit-text-size-adjust: 100%;
  }

  /* ── Phone frame ── */
  .phone-frame {
    width: 100%;
    max-width: 400px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    min-height: 780px;
  }

  /* ── Status bar ── */
  .status-bar {
    padding: 14px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-time { font-size: 14px; font-weight: 800; color: var(--text-primary); }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* ── App header ── */
  .app-header {
    padding: 14px 24px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .app-name { font-size: 15px; font-weight: 800; color: var(--text-primary); }

  /* ── Content ── */
  .content {
    padding: 32px 28px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.4px; color: var(--primary);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .page-title {
    font-size: 26px; font-weight: 400;
    color: var(--text-primary); letter-spacing: -0.5px;
    line-height: 1.3; margin-bottom: 8px;
    word-break: keep-all;
  }
  .page-sub {
    font-size: 13.5px; font-weight: 400;
    color: var(--text-secondary); line-height: 1.65;
    margin-bottom: 36px; word-break: keep-all;
  }

  /* ── Picker container ── */
  .picker-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    margin: 0 -8px;
  }

  /* ── 선택 하이라이트 바 ── */
  .picker-highlight {
    position: absolute;
    left: 12px; right: 12px;
    top: 50%; transform: translateY(-50%);
    height: 52px;
    border-radius: 14px;
    background: rgba(150,134,191,0.10);
    pointer-events: none;
    z-index: 1;
  }

  /* ── 각 컬럼 ── */
  .picker-col {
    flex: 1;
    position: relative;
    overflow: hidden;
    height: 260px;
  }

  /* 위아래 페이드 마스크 */
  .picker-col::before,
  .picker-col::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 90px;
    z-index: 2;
    pointer-events: none;
  }
  .picker-col::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 20%, transparent 100%);
  }
  .picker-col::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 20%, transparent 100%);
  }

  /* 스크롤 리스트 */
  .picker-list {
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 104px 0; /* (260 - 52) / 2 = 104 */
  }
  .picker-list::-webkit-scrollbar { display: none; }

  .picker-item {
    height: 52px;
    display: flex; align-items: center; justify-content: center;
    scroll-snap-align: center;
    font-size: 17px; font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.2s, font-weight 0.2s, font-size 0.15s;
    user-select: none;
    letter-spacing: -0.3px;
  }
  .picker-item.selected {
    font-size: 19px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .picker-item.near {
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  /* 구분선 (가운데) */
  .picker-divider {
    width: 1px;
    height: 180px;
    background: var(--divider);
    z-index: 3;
    flex-shrink: 0;
  }

  /* ── 선택된 지역 표시 칩 ── */
  .selected-region {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 14px 28px 28px;
    min-height: 60px;
  }
  .region-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--primary-tint);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 700;
    color: var(--primary);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .region-chip.show { opacity: 1; transform: translateY(0); }

  /* ── CTA ── */
  .cta-wrap { padding: 0 24px 28px; }
  .btn-next {
    width: 100%;
    background: #E8E5E1; color: #B0ABB5;
    border: none; border-radius: 14px;
    padding: 17px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 15px; font-weight: 800;
    cursor: default;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.25s, color 0.25s, transform 0.12s, box-shadow 0.22s;
  }
  .btn-next.active {
    background: var(--primary); color: #fff; cursor: pointer;
  }
  .btn-next.active:hover  { box-shadow: 0 8px 24px rgba(150,134,191,0.30); transform: translateY(-1px); }
  .btn-next.active:active { transform: scale(0.98); box-shadow: none; }

  /* ── Home indicator ── */
  .home-indicator {
    width: 120px; height: 4px;
    background: var(--text-primary);
    border-radius: 3px;
    margin: 0 auto 16px; opacity: 0.15;
  }

  /* ── 애니메이션 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .eyebrow    { animation: fadeUp 0.4s ease 0.05s both; }
  .page-title { animation: fadeUp 0.4s ease 0.10s both; }
  .page-sub   { animation: fadeUp 0.4s ease 0.14s both; }
  .picker-area { animation: fadeUp 0.4s ease 0.20s both; }
  /* ── 해외 나라 피커 ── */
  .overseas-col {
    display: none;
    flex: 1;
    position: relative;
    overflow: hidden;
    height: 260px;
  }
  .overseas-col::before,
  .overseas-col::after {
    content: '';
    position: absolute;
    left: 0; right: 0; height: 90px;
    z-index: 2; pointer-events: none;
  }
  .overseas-col::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 20%, transparent 100%);
  }
  .overseas-col::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 20%, transparent 100%);
  }
</style>
</head>
<body>

    <!-- Picker -->
    <div class="picker-area">

    <div class="selected-region">

<script>

const CITY_ORDER = ['서울','경기','인천','대전','충북','충남','강원','부산','경북','경남','대구','울산','광주','전북','전남','세종','해외'];
const cities = CITY_ORDER;

function getDistricts(city) {
  if (city === '해외') return null;
  const arr = RAW[city] ? [...RAW[city]].sort((a,b) => a.localeCompare(b,'ko')) : [];
  return ['선택안함', ...arr];
}

let selectedCityIdx     = 0;
let selectedDistrictIdx = 0;
let selectedCountryIdx  = 0;
let isOverseas          = false;

const colCity     = document.getElementById('col-city');
const colDistrict = document.getElementById('col-district');
const colCountry  = document.getElementById('col-country');
const regionChip  = document.getElementById('region-chip');
const chipText    = document.getElementById('chip-text');
const btnNext     = document.getElementById('btn-next');

const ITEM_H = 52;

/* ── 렌더링 ── */
function renderCity() {
  colCity.innerHTML = '';
  cities.forEach(c => {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = c;
    colCity.appendChild(el);
  });
}

function renderCountries() {
  colCountry.innerHTML = '';
  COUNTRIES.forEach(c => {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = c;
    colCountry.appendChild(el);
  });
}

function renderDistrict(cityIdx) {
  const city        = cities[cityIdx];
  const districtCol = document.getElementById('district-col');
  const overseasWrap = document.getElementById('overseas-wrap');
  const pickerDiv   = document.getElementById('picker-divider');

  if (city === '해외') {
    districtCol.style.display   = 'none';
    overseasWrap.style.display  = 'flex';       /* flex 사용해도 OK: 자식이 picker-list */
    overseasWrap.style.position = 'relative';
    overseasWrap.style.overflow = 'hidden';
    pickerDiv.style.opacity     = '1';
    isOverseas = true;
    /* 나라 피커 위치 초기화 */
    selectedCountryIdx = 0;
    scrollToIdx(colCountry, 0, false);
    updateStyles(colCountry, 0);
    updateChip();
    return;
  }

  isOverseas = false;
  districtCol.style.display   = '';
  overseasWrap.style.display  = 'none';
  pickerDiv.style.opacity     = '1';

  const districts = getDistricts(city);
  colDistrict.innerHTML = '';
  districts.forEach(d => {
    const el = document.createElement('div');
    el.className = 'picker-item';
    el.textContent = d;
    colDistrict.appendChild(el);
  });
}

/* ── 스타일 업데이트 ── */
function updateStyles(list, selIdx) {
  list.querySelectorAll('.picker-item').forEach((el, i) => {
    el.classList.remove('selected','near');
    const diff = Math.abs(i - selIdx);
    if (diff === 0)      el.classList.add('selected');
    else if (diff === 1) el.classList.add('near');
  });
}

function scrollToIdx(list, idx, smooth) {
  list.scrollTo({ top: idx * ITEM_H, behavior: smooth ? 'smooth' : 'instant' });
}

function getIdx(list) {
  return Math.round(list.scrollTop / ITEM_H);
}

/* ── 칩 & 버튼 업데이트 ── */
function updateChip() {
  const city = cities[selectedCityIdx];

  if (city === '해외') {
    const country = COUNTRIES[selectedCountryIdx] || '';
    chipText.textContent = '해외 · ' + country;
    regionChip.classList.add('show');
    btnNext.classList.add('active');
    return;
  }

  const districts = getDistricts(city);
  const district  = districts ? districts[selectedDistrictIdx] : '';
  chipText.textContent = district === '선택안함'
    ? city + ' · 구/군 선택안함'
    : city + ' ' + district;
  regionChip.classList.add('show');
  btnNext.classList.add('active');
}

/* ── 스크롤 바인딩 ── */
function bindScroll(list, onEnd) {
  let snapTimer = null;
  list.addEventListener('scroll', () => {
    clearTimeout(snapTimer);
    const idx = getIdx(list);
    onEnd(idx, false);
    snapTimer = setTimeout(() => {
      const idx2 = getIdx(list);
      scrollToIdx(list, idx2, true);
      onEnd(idx2, true);
    }, 80);
  });
}

/* ── 초기화 ── */
function init() {
  renderCity();
  renderCountries();
  renderDistrict(0);

  scrollToIdx(colCity, 0, false);
  scrollToIdx(colDistrict, 0, false);
  scrollToIdx(colCountry, 0, false);
  updateStyles(colCity, 0);
  updateStyles(colDistrict, 0);
  updateStyles(colCountry, 0);

  /* 시 스크롤 */
  bindScroll(colCity, (idx, final) => {
    updateStyles(colCity, idx);
    if (idx !== selectedCityIdx) {
      selectedCityIdx = idx;
      selectedDistrictIdx = 0;
      selectedCountryIdx  = 0;
      renderDistrict(idx);
      if (!isOverseas) {
        scrollToIdx(colDistrict, 0, false);
        updateStyles(colDistrict, 0);
      }
    }
    if (final) updateChip();
  });

  /* 구 스크롤 (국내) */
  bindScroll(colDistrict, (idx, final) => {
    selectedDistrictIdx = idx;
    updateStyles(colDistrict, idx);
    if (final) updateChip();
  });

  /* 나라 스크롤 (해외) */
  bindScroll(colCountry, (idx, final) => {
    selectedCountryIdx = idx;
    updateStyles(colCountry, idx);
    if (final) updateChip();
  });

  setTimeout(updateChip, 300);
}

function goNext() {
  if (!btnNext.classList.contains('active')) return;
  const city = cities[selectedCityIdx];
  let label = city === '해외'
    ? '해외 · ' + COUNTRIES[selectedCountryIdx]
    : city + ' ' + (getDistricts(city)[selectedDistrictIdx] || '');
  alert('✅ 지역 설정 완료: ' + label + '\n다음 화면으로 이동합니다.');
}

init();
</script>
