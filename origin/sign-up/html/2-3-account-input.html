<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가입 정보 입력 — 녹차</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3F1;
    --primary: #9686BF;
    --divider: #EAE7E3;
    --text-primary: #1C1A1F;
    --text-secondary: #6B6670;
    --text-muted: #ADA8B2;
    --green: #8BBFA8;
    --green-bg: rgba(150,134,191,0.12);
    --danger: #BF9696;
    --danger-bg: #F5ECEC;
    --border-default: #E8E4DF;
    --border-focus: #9686BF;
    --border-invalid: #D4A9A9;
  }

  body {
    font-family: 'Nanum Square Neo', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px 60px;
  }

  .phone-frame {
    width: 375px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
  }

  /* ── Status bar ── */
  .status-bar {
    background: var(--bg);
    padding: 14px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-time { font-size: 14px; font-weight: 800; color: var(--text-primary); }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* ── App header ── */
  .app-header {
    padding: 14px 24px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .app-name { font-size: 15px; font-weight: 800; color: var(--text-primary); }

  /* ── Content ── */
  .content { padding: 32px 28px 40px; }

  .eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.4px; color: var(--primary);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .page-title {
    font-size: 26px; font-weight: 400;
    color: var(--text-primary); letter-spacing: -0.5px;
    line-height: 1.2; margin-bottom: 6px;
  }
  .page-sub {
    font-size: 13.5px; font-weight: 400;
    color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px;
  }

  .field-group { margin-bottom: 18px; }
  .field-label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.6px;
    text-transform: uppercase; margin-bottom: 8px;
  }

  /* ── Field wrap ── */
  .field-wrap { position: relative; display: flex; align-items: center; }

  .field-icon {
    position: absolute; left: 15px;
    display: flex; align-items: center;
    pointer-events: none; z-index: 2;
  }

  /* base input */
  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: #FFFFFF;
    border: 1.5px solid transparent;
    border-radius: 14px;
    padding: 15px 52px 15px 42px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.18s;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--text-muted); }

  input:focus {
    border-color: var(--primary);
  }
  /* valid → no border */
  input.valid { border-color: transparent; }
  /* invalid → reddish border */
  input.invalid {
    border-color: var(--border-invalid);
  }

  /* ── Eye toggle ── */
  .eye-btn {
    position: absolute; right: 44px;
    background: none; border: none;
    cursor: pointer; padding: 4px;
    display: none;           /* hidden until there's a status icon */
    align-items: center;
    z-index: 3;
  }
  .eye-btn.show { display: flex; }
  /* when no status icon, eye sits at the right edge */
  .eye-btn.solo { right: 14px; }

  /* ── Status circle ── */
  .status-circle {
    position: absolute; right: 10px;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 2;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .status-circle.show { opacity: 1; }
  .status-circle.ok  { background: var(--green-bg); }
  .status-circle.err { background: var(--danger-bg); }

  /* ── Field hint ── */
  .field-hint {
    font-size: 11.5px; font-weight: 400;
    color: var(--text-muted); margin-top: 6px;
    padding-left: 2px; display: none;
  }
  .field-hint.show { display: block; }
  .field-hint.ok  { color: #9686BF; }
  .field-hint.err { color: var(--danger); }

  /* ── Strength ── */
  .strength-wrap { margin-bottom: 28px; }
  .strength-level { font-size: 12px; font-weight: 700; color: var(--text-muted); transition: color 0.2s; }
  .bars { display: flex; gap: 4px; }
  .bar { flex: 1; height: 3px; border-radius: 2px; background: var(--divider); transition: background 0.3s; }

  .divider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .divider-line { flex: 1; height: 1px; background: var(--divider); }
  .divider-text { font-size: 11px; color: var(--text-muted); font-weight: 400; white-space: nowrap; }

  /* ── Match hint ── */
  .match-hint {
    font-size: 12px; font-weight: 700;
    color: var(--text-muted); margin-top: 8px;
    display: none; padding-left: 2px;
  }
  .match-hint.show { display: block; }
  .match-hint.ok  { color: #9686BF; }
  .match-hint.err { color: var(--danger); }

  /* ── Next button ── */
  .btn-next {
    width: 100%; background: #E8E5E1; color: #B0ABB5;
    border: none; border-radius: 14px; padding: 16.5px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 15px; font-weight: 800; letter-spacing: 0.2px;
    cursor: default; display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
    transition: background 0.22s, color 0.22s, transform 0.12s, box-shadow 0.22s;
  }
  .btn-next.active {
    background: var(--primary); color: #fff;
    cursor: pointer;
  }
  .btn-next.active:hover { box-shadow: 0 8px 24px rgba(150,134,191,0.30); transform: translateY(-1px); }
  .btn-next.active:active { transform: scale(0.98); box-shadow: none; }

  .login-link {
    text-align: center; font-size: 13px; font-weight: 400;
    color: var(--text-muted); margin-top: 20px; line-height: 1.6;
  }
  .login-link span { color: var(--primary); font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="5" width="3" height="7" rx="1" fill="#1C1A1F"/>
        <rect x="4.5" y="3" width="3" height="9" rx="1" fill="#1C1A1F"/>
        <rect x="9" y="1" width="3" height="11" rx="1" fill="#1C1A1F"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1C1A1F" opacity="0.25"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 3C10.2 3 12.2 3.9 13.6 5.4L15 4C13.2 2.1 10.7 1 8 1C5.3 1 2.8 2.1 1 4L2.4 5.4C3.8 3.9 5.8 3 8 3Z" fill="#1C1A1F"/>
        <path d="M8 6C9.5 6 10.8 6.6 11.8 7.6L13.2 6.2C11.8 4.8 9.9 4 8 4C6.1 4 4.2 4.8 2.8 6.2L4.2 7.6C5.2 6.6 6.5 6 8 6Z" fill="#1C1A1F" opacity="0.6"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#1C1A1F"/>
      </svg>
      <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#1C1A1F" stroke-opacity="0.3"/>
        <rect x="2" y="2" width="18" height="9" rx="2" fill="#1C1A1F"/>
        <path d="M24.5 4.5v4C25.6 8 26.5 7.1 26.5 6.5S25.6 5 24.5 4.5Z" fill="#1C1A1F" opacity="0.35"/>
      </svg>
    </div>
  </div>

  <!-- App header -->
  <div class="app-header">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2.5 4.7v6.6L8 14.5l5.5-3.2V4.7L8 1.5Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="8" cy="8" r="2" fill="white"/>
      </svg>
    </div>
    <span class="app-name">녹차</span>
  </div>

  <!-- Content -->
  <div class="content">
    <p class="eyebrow">회원가입</p>
    <h1 class="page-title">가입 정보 입력</h1>
    <p class="page-sub">계정 생성을 위해 정보를 입력해 주세요</p>

    <!-- 아이디 -->
    <div class="field-group">
      <label class="field-label" for="inp-id">아이디</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="5.5" r="2.8" stroke="#ADA8B2" stroke-width="1.3"/>
            <path d="M1.5 13.5c0-3 2.7-5 6-5s6 2 6 5" stroke="#ADA8B2" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="inp-id" placeholder="영문, 숫자 포함 4–16자" autocomplete="off" spellcheck="false"/>
        <span class="status-circle" id="st-id"></span>
      </div>
      <p class="field-hint" id="hint-id"></p>
    </div>

    <!-- 비밀번호 -->
    <div class="field-group">
      <label class="field-label" for="inp-pw">비밀번호</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
            <rect x="1" y="6.5" width="12" height="9" rx="2.5" stroke="#ADA8B2" stroke-width="1.3"/>
            <path d="M4 6.5V5C4 3.3 5.3 2 7 2s3 1.3 3 3v1.5" stroke="#ADA8B2" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7" cy="11" r="1.2" fill="#ADA8B2"/>
          </svg>
        </span>
        <input type="password" id="inp-pw" placeholder="영문, 숫자, 특수문자 포함 8자 이상" autocomplete="new-password"/>
        <button class="eye-btn show solo" type="button" id="toggle-pw" aria-label="비밀번호 표시">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M1 6s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5Z" stroke="#ADA8B2" stroke-width="1.2"/>
            <circle cx="8" cy="6" r="2" stroke="#ADA8B2" stroke-width="1.2"/>
          </svg>
        </button>
        <span class="status-circle" id="st-pw"></span>
      </div>
      <p class="field-hint" id="hint-pw"></p>
    </div>

    <!-- Strength -->
    <div class="strength-wrap">
      <div class="divider-row">
        <div class="divider-line"></div>
        <span class="divider-text">비밀번호 강도</span>
        <div class="divider-line"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:6px;">
        <span class="strength-level" id="strength-label">—</span>
      </div>
      <div class="bars">
        <div class="bar" id="bar1"></div>
        <div class="bar" id="bar2"></div>
        <div class="bar" id="bar3"></div>
        <div class="bar" id="bar4"></div>
      </div>
    </div>

    <!-- 비밀번호 재입력 -->
    <div class="field-group">
      <label class="field-label" for="inp-pw2">비밀번호 재입력</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
            <rect x="1" y="6.5" width="12" height="9" rx="2.5" stroke="#ADA8B2" stroke-width="1.3"/>
            <path d="M4 6.5V5C4 3.3 5.3 2 7 2s3 1.3 3 3v1.5" stroke="#ADA8B2" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="7" cy="11" r="1.2" fill="#ADA8B2"/>
          </svg>
        </span>
        <input type="password" id="inp-pw2" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password"/>
        <button class="eye-btn show solo" type="button" id="toggle-pw2" aria-label="비밀번호 표시">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M1 6s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5Z" stroke="#ADA8B2" stroke-width="1.2"/>
            <circle cx="8" cy="6" r="2" stroke="#ADA8B2" stroke-width="1.2"/>
          </svg>
        </button>
      </div>
      <p class="match-hint" id="match-hint"></p>
    </div>

    <!-- Next button -->
    <button class="btn-next" id="btn-next" type="button">
      다음으로
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <p class="login-link">이미 계정이 있으신가요? <span>로그인</span></p>
  </div>
</div>

<script>
  const inpId  = document.getElementById('inp-id');
  const inpPw  = document.getElementById('inp-pw');
  const inpPw2 = document.getElementById('inp-pw2');
  const stId   = document.getElementById('st-id');
  const stPw   = document.getElementById('st-pw');
  const hintId = document.getElementById('hint-id');
  const hintPw = document.getElementById('hint-pw');
  const matchHint = document.getElementById('match-hint');
  const btnNext   = document.getElementById('btn-next');
  const bars = [1,2,3,4].map(i => document.getElementById('bar'+i));
  const strengthLabel = document.getElementById('strength-label');
  const togglePw  = document.getElementById('toggle-pw');
  const togglePw2 = document.getElementById('toggle-pw2');

  const RE_ID = /^[a-zA-Z0-9]{4,16}$/;
  const RE_PW = /^(?=.*[a-zA-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;

  let validId = false, validPw = false, validPw2 = false;

  /* ── SVG icons ── */
  const ICON_OK = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none">
    <path d="M1 4.5L4.5 8L11 1" stroke="#9686BF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
  const ICON_ERR = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
    <path d="M1 1L9 9M9 1L1 9" stroke="#BF9696" stroke-width="1.8" stroke-linecap="round"/>
  </svg>`;

  /* ── Set field state ── */
  function setStatus(input, circle, isValid, hasValue, eyeBtn) {
    input.classList.remove('valid','invalid');
    circle.classList.remove('show','ok','err');
    circle.innerHTML = '';

    if (eyeBtn) {
      eyeBtn.classList.remove('solo');
      eyeBtn.style.right = '';
    }

    if (!hasValue) {
      /* no value → eye returns to solo position */
      if (eyeBtn) eyeBtn.classList.add('solo');
      return;
    }

    if (isValid) {
      input.classList.add('valid');
      circle.classList.add('show','ok');
      circle.innerHTML = ICON_OK;
    } else {
      input.classList.add('invalid');
      circle.classList.add('show','err');
      circle.innerHTML = ICON_ERR;
    }
    /* eye shifts left to make room for circle */
    if (eyeBtn) {
      eyeBtn.classList.remove('solo');
    }
  }

  function setHint(el, text, cls) { el.textContent = text; el.className = 'field-hint show ' + cls; }
  function hideHint(el) { el.textContent = ''; el.className = 'field-hint'; }

  function updateButton() {
    btnNext.classList.toggle('active', validId && validPw && validPw2);
  }

  /* ── 아이디 ── */
  inpId.addEventListener('input', () => {
    const v = inpId.value;
    if (!v) { hideHint(hintId); setStatus(inpId, stId, false, false, null); validId=false; updateButton(); return; }
    validId = RE_ID.test(v);
    setStatus(inpId, stId, validId, true, null);
    if (validId) setHint(hintId, '사용 가능한 아이디입니다', 'ok');
    else if (v.length < 4)  setHint(hintId, '4자 이상 입력해 주세요', 'err');
    else if (v.length > 16) setHint(hintId, '16자 이하로 입력해 주세요', 'err');
    else setHint(hintId, '영문과 숫자만 사용할 수 있습니다', 'err');
    updateButton();
  });

  /* ── 비밀번호 강도 ── */
  function calcStrength(pw) {
    let s = 0;
    if (pw.length >= 8) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/\d/.test(pw)) s++;
    if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)) s++;
    return s;
  }
  const SC = ['#BF9696','#C4885A','#9686BF','#8BBFA8'];
  const ST = ['약함','보통','강함','매우 강함'];
  function updateStrength(pw) {
    const s = pw ? calcStrength(pw) : 0;
    bars.forEach((b,i) => { b.style.background = (pw && i < s) ? SC[s-1] : 'var(--divider)'; });
    if (!pw) { strengthLabel.textContent = '—'; strengthLabel.style.color = 'var(--text-muted)'; }
    else { strengthLabel.textContent = ST[s-1]||'약함'; strengthLabel.style.color = SC[s-1]; }
  }

  /* ── 비밀번호 ── */
  inpPw.addEventListener('input', () => {
    const v = inpPw.value;
    updateStrength(v);
    if (!v) { hideHint(hintPw); setStatus(inpPw, stPw, false, false, togglePw); validPw=false; updateButton(); revalidatePw2(); return; }
    validPw = RE_PW.test(v);
    setStatus(inpPw, stPw, validPw, true, togglePw);
    if (validPw) setHint(hintPw, '사용 가능한 비밀번호입니다', 'ok');
    else setHint(hintPw, '영문, 숫자, 특수문자를 포함해 8자 이상 입력해 주세요', 'err');
    revalidatePw2();
    updateButton();
  });

  /* ── 비밀번호 재입력 ── */
  function revalidatePw2() {
    const v2 = inpPw2.value;
    if (!v2) { validPw2=false; updateButton(); return; }
    const match = v2 === inpPw.value;
    validPw2 = match && validPw;
    matchHint.className = 'match-hint show ' + (match ? 'ok' : 'err');
    matchHint.textContent = match ? '비밀번호가 일치합니다' : '비밀번호가 일치하지 않습니다';
    updateButton();
  }

  inpPw2.addEventListener('input', () => {
    const v2 = inpPw2.value;
    if (!v2) { matchHint.className = 'match-hint'; validPw2=false; updateButton(); return; }
    revalidatePw2();
  });

  /* ── Eye toggles ── */
  function makeEye(btn, input) {
    let shown = false;
    btn.addEventListener('click', () => {
      shown = !shown;
      input.type = shown ? 'text' : 'password';
      btn.style.opacity = shown ? '0.5' : '1';
    });
  }
  makeEye(togglePw, inpPw);
  makeEye(togglePw2, inpPw2);

  /* ── Next button ── */
  btnNext.addEventListener('click', () => {
    if (!btnNext.classList.contains('active')) return;
    btnNext.innerHTML = '완료! <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    btnNext.style.background = '#8BBFA8';
    btnNext.style.boxShadow = '0 8px 24px rgba(139,191,168,0.35)';
  });
</script>
</body>
</html>
