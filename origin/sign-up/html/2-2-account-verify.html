<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핸드폰 번호 인증</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F5F3F1;
    --surface: #FFFFFF;
    --surface-2: #EDEAE7;
    --primary: #9686BF;
    --primary-light: #EDE9F6;
    --text-main: #1C1A1F;
    --text-sub: #7B7683;
    --text-hint: #ADA8B6;
    --radius: 14px;
    --radius-sm: 10px;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Nanum Square Neo', sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 12px 60px;
  }

  /* ── Phone frame ── */
  .phone-frame {
    width: 100%;
    max-width: 400px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.04);
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px 0;
  }
  .status-time {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-main);
  }
  .status-icons { display: flex; align-items: center; gap: 5px; }

  /* ── Nav ── */
  .nav {
    padding: 20px 24px 0;
  }
  .nav-back {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface-2);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .nav-back:hover { background: #E0DDD9; }
  .nav-back:active { background: #D6D3CF; }

  /* ── Content ── */
  .content {
    padding: 32px 24px 0;
    display: flex;
    flex-direction: column;
  }

  .step-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    color: var(--primary);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .title {
    font-size: 24px;
    font-weight: 400;
    color: var(--text-main);
    line-height: 1.35;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 400;
    line-height: 1.65;
    margin-bottom: 36px;
  }

  /* ── Progress ── */
  .progress {
    display: flex;
    gap: 5px;
    margin-bottom: 36px;
  }
  .dot {
    height: 3px;
    border-radius: 2px;
    background: var(--surface-2);
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .dot.active { background: var(--primary); width: 24px; }
  .dot:not(.active) { width: 8px; }

  /* ── Form group ── */
  .form-group { margin-bottom: 14px; }

  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.7px;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* ── Input row (phone + button) ── */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
    width: 100%;
  }

  /* ── Input wrap ── */
  .input-wrap {
    flex: 1;
    min-width: 0;          /* critical: stops flex child overflowing */
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    outline: 1.5px solid transparent;
    transition: outline-color 0.2s;
  }
  .input-wrap:focus-within {
    outline-color: var(--primary);
  }

  .flag { font-size: 18px; line-height: 1; flex-shrink: 0; }

  .divider-v {
    width: 1px; height: 16px;
    background: var(--surface-2);
    flex-shrink: 0;
  }

  input {
    border: none;
    background: transparent;
    outline: none;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-main);
    flex: 1;
    min-width: 0;          /* critical */
    width: 0;              /* forces flex shrink properly */
  }
  input::placeholder { color: var(--text-hint); }

  /* ── Verify button ── */
  .btn-verify {
    flex-shrink: 0;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Nanum Square Neo', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    height: auto;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-verify:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-verify:active { transform: scale(0.97); }

  /* ── OTP row ── */
  .otp-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
    width: 100%;
  }
  .otp-row .input-wrap { flex: 1; min-width: 0; }

  .btn-confirm {
    flex-shrink: 0;
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: var(--radius-sm);
    padding: 0 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Nanum Square Neo', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-confirm:hover { opacity: 0.8; transform: translateY(-1px); }
  .btn-confirm:active { transform: scale(0.97); }

  /* ── Timer ── */
  .timer {
    font-size: 12px;
    color: var(--primary);
    font-weight: 700;
    margin-top: 7px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Info card ── */
  .info-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-top: 28px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .info-icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .info-text {
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.65;
    font-weight: 400;
    word-break: keep-all;
  }
  .info-text strong {
    color: var(--text-main);
    font-weight: 700;
  }

  /* ── CTA ── */
  .cta-wrap {
    padding: 32px 24px 28px;
  }
  .btn-cta {
    width: 100%;
    background: #E8E5E1;
    color: #B0ABB5;
    border: none;
    border-radius: var(--radius);
    padding: 17px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Nanum Square Neo', sans-serif;
    cursor: default;
    transition: background 0.2s, color 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn-cta:not(:disabled) {
    background: var(--primary);
    color: #fff;
    cursor: pointer;
  }
  .btn-cta:not(:disabled):hover {
    box-shadow: 0 8px 24px rgba(150,134,191,0.30);
    transform: translateY(-1px);
  }
  .btn-cta:not(:disabled):active { transform: scale(0.98); box-shadow: none; }

  /* ── Home indicator ── */
  .home-indicator {
    width: 120px; height: 4px;
    background: var(--text-main);
    border-radius: 3px;
    margin: 0 auto 16px;
    opacity: 0.15;
  }

  /* ── Fade-up animation ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .step-label { animation: fadeUp 0.4s ease 0.05s both; }
  .title      { animation: fadeUp 0.4s ease 0.10s both; }
  .subtitle   { animation: fadeUp 0.4s ease 0.14s both; }
  .progress   { animation: fadeUp 0.4s ease 0.17s both; }
  .form-group { animation: fadeUp 0.4s ease 0.20s both; }
  .info-card  { animation: fadeUp 0.4s ease 0.26s both; }
  .cta-wrap   { animation: fadeUp 0.4s ease 0.30s both; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" fill="none" viewBox="0 0 17 12">
        <rect x="0"    y="3"   width="3" height="9"    rx="1" fill="#1C1A1F" opacity=".3"/>
        <rect x="4.5"  y="2"   width="3" height="10"   rx="1" fill="#1C1A1F" opacity=".5"/>
        <rect x="9"    y="0.5" width="3" height="11.5" rx="1" fill="#1C1A1F" opacity=".75"/>
        <rect x="13.5" y="0"   width="3" height="12"   rx="1" fill="#1C1A1F"/>
      </svg>
      <svg width="16" height="12" fill="none" viewBox="0 0 16 12">
        <path d="M8 2.5C10.5 2.5 12.7 3.6 14.2 5.3L15.5 4C13.6 1.9 11 0.5 8 0.5C5 0.5 2.4 1.9 0.5 4L1.8 5.3C3.3 3.6 5.5 2.5 8 2.5Z" fill="#1C1A1F" opacity=".3"/>
        <path d="M8 5.5C9.7 5.5 11.2 6.2 12.3 7.4L13.6 6.1C12.1 4.5 10.2 3.5 8 3.5C5.8 3.5 3.9 4.5 2.4 6.1L3.7 7.4C4.8 6.2 6.3 5.5 8 5.5Z" fill="#1C1A1F" opacity=".6"/>
        <circle cx="8" cy="10" r="1.5" fill="#1C1A1F"/>
      </svg>
      <svg width="25" height="12" fill="none" viewBox="0 0 25 12">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1C1A1F" stroke-opacity=".35"/>
        <rect x="2"   y="2"   width="16" height="8"  rx="2"   fill="#1C1A1F"/>
        <path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="#1C1A1F" opacity=".4"/>
      </svg>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-back" onclick="history.back()">
      <svg width="18" height="18" fill="none" viewBox="0 0 18 18">
        <path d="M11 13.5L6.5 9L11 4.5" stroke="#1C1A1F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <span class="step-label">Step 1 of 3</span>
    <h1 class="title">핸드폰 번호<br>인증</h1>
    <p class="subtitle">간편하고 안전한 본인 확인을 위해<br>번호를 입력해 주세요</p>

    <div class="progress">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- 휴대폰 번호 -->
    <div class="form-group">
      <label class="field-label">휴대폰 번호</label>
      <div class="input-row">
        <div class="input-wrap">
          <span class="flag">🇰🇷</span>
          <div class="divider-v"></div>
          <input type="tel" id="phone" placeholder="010-0000-0000" maxlength="13"
            oninput="formatPhone(this); checkInput()">
        </div>
        <button class="btn-verify" onclick="sendCode()">인증</button>
      </div>
    </div>

    <!-- 인증번호 -->
    <div class="form-group">
      <label class="field-label">인증번호</label>
      <div class="otp-row">
        <div class="input-wrap">
          <input type="text" id="otp" placeholder="6자리 입력" maxlength="6"
            oninput="checkInput()" inputmode="numeric">
        </div>
        <button class="btn-confirm" onclick="verifyCode()">확인</button>
      </div>
      <div class="timer" id="timer" style="display:none">
        <svg width="12" height="12" fill="none" viewBox="0 0 12 12">
          <circle cx="6" cy="6" r="5" stroke="#9686BF" stroke-width="1.2"/>
          <path d="M6 3.5V6L7.5 7.5" stroke="#9686BF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span id="timer-text">02:59</span>
      </div>
    </div>

    <!-- Info card -->
    <div class="info-card">
      <div class="info-icon">
        <svg width="9" height="9" fill="none" viewBox="0 0 9 9">
          <path d="M4.5 2V4.5M4.5 6.5V6.6" stroke="#9686BF" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="info-text">
        위 인증을 통해 <strong>여성인증, 성인인증, 본인인증</strong>을 진행합니다.<br>
        나이, 성별 외의 정보는 수집하지 않습니다.
      </p>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="btn-cta" id="cta" disabled>다음으로</button>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
let timerInterval = null;
let seconds = 179;

function formatPhone(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.length <= 3)      input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3) + '-' + v.slice(3);
  else                    input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
}

function sendCode() {
  const phone = document.getElementById('phone').value.replace(/\D/g,'');
  if (phone.length < 10) return;
  document.getElementById('timer').style.display = 'flex';
  seconds = 179;
  clearInterval(timerInterval);
  updateTimer();
  timerInterval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer-text').textContent = '만료됨';
    } else updateTimer();
  }, 1000);
}

function updateTimer() {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('timer-text').textContent = m + ':' + s;
}

function checkInput() {
  const phone = document.getElementById('phone').value.replace(/\D/g,'');
  const otp   = document.getElementById('otp').value;
  document.getElementById('cta').disabled = !(phone.length >= 10 && otp.length === 6);
}

function verifyCode() {
  if (document.getElementById('otp').value.length === 6) {
    document.getElementById('cta').disabled = false;
  }
}
</script>
</body>
</html>
