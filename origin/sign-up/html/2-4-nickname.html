<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>닉네임 설정 — 녹차</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3F1;
    --surface: #FFFFFF;
    --surface-2: #EDEAE7;
    --primary: #9686BF;
    --primary-tint: rgba(150,134,191,0.10);
    --divider: #EAE7E3;
    --text-primary: #1C1A1F;
    --text-secondary: #6B6670;
    --text-muted: #ADA8B2;
    --green: #8BBFA8;
    --green-bg: rgba(150,134,191,0.10);
    --danger: #BF9696;
    --danger-bg: #F5ECEC;
    --border-invalid: #D4A9A9;
  }

  html, body { width: 100%; }

  body {
    font-family: 'Nanum Square Neo', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 12px 60px;
    -webkit-text-size-adjust: 100%;
  }

  /* ── Phone frame ── */
  .phone-frame {
    width: 100%;
    max-width: 400px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.05);
  }

  /* ── Status bar ── */
  .status-bar {
    padding: 14px 24px 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  .status-time { font-size: 14px; font-weight: 800; color: var(--text-primary); }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* ── App header ── */
  .app-header {
    padding: 14px 24px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .app-name { font-size: 15px; font-weight: 800; color: var(--text-primary); }

  /* ── Content ── */
  .content { padding: 32px 24px 40px; }

  .eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.4px; color: var(--primary);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .page-title {
    font-size: 26px; font-weight: 400;
    color: var(--text-primary); letter-spacing: -0.5px;
    line-height: 1.3; margin-bottom: 8px;
  }
  .page-sub {
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary); line-height: 1.65;
    margin-bottom: 36px;
    word-break: keep-all;
  }

  /* ── Field ── */
  .field-group { margin-bottom: 10px; }

  .field-label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.6px;
    text-transform: uppercase; margin-bottom: 8px;
  }

  .field-wrap {
    position: relative; display: flex; align-items: center;
  }

  .field-icon {
    position: absolute; left: 15px;
    display: flex; align-items: center;
    pointer-events: none; z-index: 2;
  }

  /* ── Input ── */
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: 14px;
    /* right: status circle(38px) + count(40px) */
    padding: 15px 82px 15px 42px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.18s;
    -webkit-appearance: none;
    min-width: 0;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus { border-color: var(--primary); }
  input.invalid { border-color: var(--border-invalid); }

  /* ── 글자수 카운터 ── */
  .char-count {
    position: absolute; right: 44px;
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    pointer-events: none; z-index: 2;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .char-count.over { color: var(--danger); }
  .char-count.ok   { color: var(--primary); }

  /* ── 상태 원형 아이콘 ── */
  .status-circle {
    position: absolute; right: 10px;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 2;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .status-circle.show { opacity: 1; }
  .status-circle.ok  { background: var(--green-bg); }
  .status-circle.err { background: var(--danger-bg); }

  /* ── 상태 힌트 ── */
  .field-hint {
    font-size: 11.5px; font-weight: 400;
    margin-top: 7px; padding-left: 2px;
    display: none; line-height: 1.5;
    word-break: keep-all;
  }
  .field-hint.show { display: block; }
  .field-hint.ok   { color: var(--primary); }
  .field-hint.err  { color: var(--danger); }

  /* ── 프로필 미리보기 카드 ── */
  .preview-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 18px 20px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .preview-card.show { opacity: 1; transform: translateY(0); }

  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--primary-tint);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 18px; font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
  }
  .preview-info {}
  .preview-label {
    font-size: 10.5px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 3px;
  }
  .preview-name {
    font-size: 15px; font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  /* ── 금칙어 안내 ── */
  .banned-wrap {
    background: var(--danger-bg);
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 10px;
    display: none;
    align-items: flex-start;
    gap: 8px;
  }
  .banned-wrap.show { display: flex; }
  .banned-text {
    font-size: 12px; font-weight: 700;
    color: var(--danger); line-height: 1.5;
  }

  /* ── 다음으로 버튼 ── */
  .btn-next {
    width: 100%;
    background: #E8E5E1; color: #B0ABB5;
    border: none; border-radius: 14px;
    padding: 16.5px;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 15px; font-weight: 800;
    cursor: default;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 32px;
    transition: background 0.22s, color 0.22s, transform 0.12s, box-shadow 0.22s;
  }
  .btn-next.active {
    background: var(--primary); color: #fff; cursor: pointer;
  }
  .btn-next.active:hover {
    box-shadow: 0 8px 24px rgba(150,134,191,0.30); transform: translateY(-1px);
  }
  .btn-next.active:active { transform: scale(0.98); box-shadow: none; }

  /* ── 홈 인디케이터 ── */
  .home-indicator {
    width: 120px; height: 4px;
    background: var(--text-primary);
    border-radius: 3px;
    margin: 28px auto 16px;
    opacity: 0.15;
  }

  /* ── 애니메이션 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .eyebrow      { animation: fadeUp 0.4s ease 0.05s both; }
  .page-title   { animation: fadeUp 0.4s ease 0.10s both; }
  .page-sub     { animation: fadeUp 0.4s ease 0.14s both; }
  .field-group  { animation: fadeUp 0.4s ease 0.18s both; }
  .btn-next     { animation: fadeUp 0.4s ease 0.22s both; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" fill="none" viewBox="0 0 17 12">
        <rect x="0"    y="3"   width="3" height="9"    rx="1" fill="#1C1A1F" opacity=".3"/>
        <rect x="4.5"  y="2"   width="3" height="10"   rx="1" fill="#1C1A1F" opacity=".5"/>
        <rect x="9"    y="0.5" width="3" height="11.5" rx="1" fill="#1C1A1F" opacity=".75"/>
        <rect x="13.5" y="0"   width="3" height="12"   rx="1" fill="#1C1A1F"/>
      </svg>
      <svg width="16" height="12" fill="none" viewBox="0 0 16 12">
        <path d="M8 3C10.2 3 12.2 3.9 13.6 5.4L15 4C13.2 2.1 10.7 1 8 1C5.3 1 2.8 2.1 1 4L2.4 5.4C3.8 3.9 5.8 3 8 3Z" fill="#1C1A1F"/>
        <path d="M8 6C9.5 6 10.8 6.6 11.8 7.6L13.2 6.2C11.8 4.8 9.9 4 8 4C6.1 4 4.2 4.8 2.8 6.2L4.2 7.6C5.2 6.6 6.5 6 8 6Z" fill="#1C1A1F" opacity=".6"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#1C1A1F"/>
      </svg>
      <svg width="27" height="13" fill="none" viewBox="0 0 27 13">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#1C1A1F" stroke-opacity=".3"/>
        <rect x="2"   y="2"   width="18" height="9"  rx="2"   fill="#1C1A1F"/>
        <path d="M24.5 4.5v4C25.6 8 26.5 7.1 26.5 6.5S25.6 5 24.5 4.5Z" fill="#1C1A1F" opacity=".35"/>
      </svg>
    </div>
  </div>

  <!-- App header -->
  <div class="app-header">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2.5 4.7v6.6L8 14.5l5.5-3.2V4.7L8 1.5Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="8" cy="8" r="2" fill="white"/>
      </svg>
    </div>
    <span class="app-name">녹차</span>
  </div>

  <!-- Content -->
  <div class="content">
    <p class="eyebrow">프로필 설정</p>
    <h1 class="page-title">닉네임을<br>만들어보세요!</h1>
    <p class="page-sub">프로필에 표시되는 이름으로,<br>언제든 변경 가능해요.</p>

    <!-- 닉네임 입력 -->
    <div class="field-group">
      <label class="field-label" for="inp-nick">닉네임</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="5.5" r="2.8" stroke="#ADA8B2" stroke-width="1.3"/>
            <path d="M1.5 13.5c0-3 2.7-5 6-5s6 2 6 5" stroke="#ADA8B2" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="inp-nick"
          placeholder="닉네임을 입력하세요"
          maxlength="12"
          autocomplete="off" spellcheck="false"
          oninput="onNickInput()"/>
        <span class="char-count" id="char-count">0/10</span>
        <span class="status-circle" id="st-nick"></span>
      </div>

      <!-- 상태 힌트 -->
      <p class="field-hint" id="hint-nick"></p>

      <!-- 금칙어 배너 -->
      <div class="banned-wrap" id="banned-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0;margin-top:1px">
          <circle cx="7" cy="7" r="6" stroke="#BF9696" stroke-width="1.3"/>
          <path d="M7 4v3.5M7 9.5V9.6" stroke="#BF9696" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span class="banned-text" id="banned-text"></span>
      </div>
    </div>

    <!-- 프로필 미리보기 -->
    <div class="preview-card" id="preview-card">
      <div class="avatar" id="avatar-letter">?</div>
      <div class="preview-info">
        <p class="preview-label">미리보기</p>
        <p class="preview-name" id="preview-name">—</p>
      </div>
    </div>

    <!-- 다음으로 버튼 -->
    <button class="btn-next" id="btn-next" type="button" onclick="goNext()">
      다음으로
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
  const inpNick     = document.getElementById('inp-nick');
  const charCount   = document.getElementById('char-count');
  const stNick      = document.getElementById('st-nick');
  const hintNick    = document.getElementById('hint-nick');
  const bannedWrap  = document.getElementById('banned-wrap');
  const bannedText  = document.getElementById('banned-text');
  const previewCard = document.getElementById('preview-card');
  const avatarLetter = document.getElementById('avatar-letter');
  const previewName = document.getElementById('preview-name');
  const btnNext     = document.getElementById('btn-next');

  const MAX_LEN = 10;

  /* ── 금칙어 목록 (실제 서비스에서 확장) ── */
  const BANNED_WORDS = [
    '관리자', '어드민', 'admin', 'manager', '운영자',
    '욕설1', '욕설2', '시발', '씨발', '개새끼', '병신',
    '녹차봇', '녹차관리'
  ];

  /* ── 이미 사용 중인 닉네임 (DB 대신 더미 데이터) ── */
  const TAKEN_NICKS = ['녹차러버', '茶人', 'teamaster', '녹차왕', 'greentea', '차한잔'];

  /* ── SVG 아이콘 ── */
  const ICON_OK = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none">
    <path d="M1 4.5L4.5 8L11 1" stroke="#9686BF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
  const ICON_ERR = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
    <path d="M1 1L9 9M9 1L1 9" stroke="#BF9696" stroke-width="1.8" stroke-linecap="round"/>
  </svg>`;

  let debounceTimer = null;
  let isValid = false;

  function onNickInput() {
    const raw = inpNick.value;
    const len = [...raw].length; /* 유니코드 정확한 글자 수 */

    /* ── 글자수 카운터 ── */
    charCount.textContent = len + '/' + MAX_LEN;
    charCount.classList.remove('ok', 'over');
    if (len === 0) {
      charCount.style.display = 'none';
    } else {
      charCount.style.display = '';
      if (len > MAX_LEN)      charCount.classList.add('over');
      else if (len >= MAX_LEN * 0.7) charCount.classList.add('ok');
    }

    /* ── 초기화 ── */
    resetState();

    if (len === 0) {
      previewCard.classList.remove('show');
      return;
    }

    /* ── 즉시 검사: 길이 초과 ── */
    if (len > MAX_LEN) {
      setErr('10자 이내로 입력해 주세요');
      return;
    }

    /* ── 즉시 검사: 특수문자 (한글, 영문, 숫자, _ 만 허용) ── */
    if (!/^[가-힣a-zA-Z0-9_]+$/.test(raw)) {
      setErr('한글, 영문, 숫자, _ 만 사용할 수 있어요');
      return;
    }

    /* ── 즉시 검사: 금칙어 ── */
    const lowerRaw = raw.toLowerCase();
    const foundBanned = BANNED_WORDS.find(w => lowerRaw.includes(w.toLowerCase()));
    if (foundBanned) {
      setBanned('사용할 수 없는 단어가 포함되어 있어요');
      return;
    }

    /* ── 디바운스: 중복 닉네임 검사 (입력 멈춘 후 500ms) ── */
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => checkDuplicate(raw), 500);
  }

  function checkDuplicate(nick) {
    /* 실제 서비스: fetch('/api/check-nickname?nick=' + encodeURIComponent(nick)) */
    const taken = TAKEN_NICKS.some(n => n.toLowerCase() === nick.toLowerCase());

    if (taken) {
      setErr('이미 사용 중인 닉네임입니다');
    } else {
      setOk(nick);
    }
  }

  /* ── 성공 상태 ── */
  function setOk(nick) {
    isValid = true;
    inpNick.classList.remove('invalid');
    stNick.className = 'status-circle show ok';
    stNick.innerHTML = ICON_OK;

    setHint('사용 가능한 닉네임이에요', 'ok');
    bannedWrap.classList.remove('show');

    /* 프로필 미리보기 */
    previewName.textContent = nick;
    avatarLetter.textContent = [...nick][0].toUpperCase();
    previewCard.classList.add('show');

    btnNext.classList.add('active');
  }

  /* ── 오류 상태 ── */
  function setErr(msg) {
    isValid = false;
    inpNick.classList.add('invalid');
    stNick.className = 'status-circle show err';
    stNick.innerHTML = ICON_ERR;
    setHint(msg, 'err');
    bannedWrap.classList.remove('show');
    previewCard.classList.remove('show');
    btnNext.classList.remove('active');
  }

  /* ── 금칙어 상태 ── */
  function setBanned(msg) {
    isValid = false;
    inpNick.classList.add('invalid');
    stNick.className = 'status-circle show err';
    stNick.innerHTML = ICON_ERR;
    hintNick.className = 'field-hint';
    bannedText.textContent = msg;
    bannedWrap.classList.add('show');
    previewCard.classList.remove('show');
    btnNext.classList.remove('active');
  }

  /* ── 힌트 설정 ── */
  function setHint(msg, type) {
    hintNick.textContent = msg;
    hintNick.className = 'field-hint show ' + type;
  }

  /* ── 초기화 ── */
  function resetState() {
    isValid = false;
    inpNick.classList.remove('invalid');
    stNick.className = 'status-circle';
    stNick.innerHTML = '';
    hintNick.className = 'field-hint';
    hintNick.textContent = '';
    bannedWrap.classList.remove('show');
    btnNext.classList.remove('active');
    clearTimeout(debounceTimer);
  }

  /* ── 다음으로 ── */
  function goNext() {
    if (!btnNext.classList.contains('active')) return;
    /* 실제 서비스: 닉네임 저장 후 다음 화면 이동 */
    alert('✅ 닉네임 "' + inpNick.value + '" 이(가) 설정되었습니다!\n다음 화면으로 이동합니다.');
    /* window.location.href = 'home.html'; */
  }

  /* ── 초기 카운터 숨김 ── */
  charCount.style.display = 'none';
</script>
</body>
</html>
