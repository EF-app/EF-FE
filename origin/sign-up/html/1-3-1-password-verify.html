<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정 — 녹차</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Square+Neo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F5F3F1;
    --surface: #FFFFFF;
    --surface-2: #EDEAE7;
    --primary: #9686BF;
    --primary-light: #EDE9F6;
    --primary-tint: rgba(150,134,191,0.10);
    --divider: #EAE7E3;
    --text-main: #1C1A1F;
    --text-sub: #7B7683;
    --text-hint: #ADA8B6;
    --danger: #BF9696;
    --danger-bg: #F5ECEC;
    --green: #8BBFA8;
    --green-bg: #EAF4EF;
    --radius: 14px;
    --radius-sm: 10px;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Nanum Square Neo', sans-serif;
    -webkit-text-size-adjust: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 12px 60px;
  }

  /* ── Phone frame ── */
  .phone-frame {
    width: 100%;
    max-width: 400px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.09), 0 2px 8px rgba(0,0,0,0.04);
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px 0;
  }
  .status-time { font-size: 14px; font-weight: 800; color: var(--text-main); }
  .status-icons { display: flex; align-items: center; gap: 5px; }

  /* ── App header ── */
  .app-header {
    padding: 14px 24px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .app-name { font-size: 15px; font-weight: 800; color: var(--text-main); }

  /* ── Nav ── */
  .nav { padding: 16px 24px 0; }
  .nav-back {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface-2);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .nav-back:hover  { background: #E0DDD9; }
  .nav-back:active { background: #D6D3CF; }

  /* ── Content ── */
  .content { padding: 28px 24px 0; flex: 1; display: flex; flex-direction: column; }

  .step-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.4px; color: var(--primary);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .title {
    font-size: 24px; font-weight: 400;
    color: var(--text-main); line-height: 1.35;
    letter-spacing: -0.3px; margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px; color: var(--text-sub);
    font-weight: 400; line-height: 1.65;
    margin-bottom: 32px; word-break: keep-all;
  }

  /* ── Form group ── */
  .form-group { margin-bottom: 14px; }

  .field-label {
    display: block;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.7px; color: var(--text-hint);
    text-transform: uppercase; margin-bottom: 8px;
  }

  /* ── Input row (field + button) ── */
  .input-row {
    display: flex; gap: 8px;
    align-items: stretch; width: 100%;
  }

  /* ── 아이디 단독 input ── */
  .input-solo {
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px 14px 42px;
    border: 1.5px solid transparent;
    outline: none;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-main);
    transition: border-color 0.18s;
    -webkit-appearance: none;
    min-width: 0;
    display: block;
  }
  .input-solo::placeholder { color: var(--text-hint); }
  .input-solo:focus { border-color: var(--primary); }
  .input-solo.invalid { border-color: #D4A9A9; }

  /* 아이디 필드 wrap (아이콘 포함) */
  .field-wrap {
    position: relative; display: flex; align-items: center;
  }
  .field-icon {
    position: absolute; left: 14px;
    display: flex; align-items: center;
    pointer-events: none; z-index: 2;
  }

  /* ── Input wrap (flex 안에서 쓰는 것) ── */
  .input-wrap {
    flex: 1; min-width: 0;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    outline: 1.5px solid transparent;
    transition: outline-color 0.2s;
  }
  .input-wrap:focus-within { outline-color: var(--primary); }

  .flag { font-size: 18px; line-height: 1; flex-shrink: 0; }
  .divider-v { width: 1px; height: 16px; background: var(--surface-2); flex-shrink: 0; }

  input.tel-input, input.otp-input {
    border: none; background: transparent; outline: none;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 14px; font-weight: 400;
    color: var(--text-main);
    flex: 1; min-width: 0; width: 0;
  }
  input.tel-input::placeholder,
  input.otp-input::placeholder { color: var(--text-hint); }

  /* ── Action buttons ── */
  .btn-action {
    flex-shrink: 0;
    background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 0 18px;
    font-size: 13px; font-weight: 700;
    font-family: 'Nanum Square Neo', sans-serif;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-action:hover  { opacity: 0.88; transform: translateY(-1px); }
  .btn-action:active { transform: scale(0.97); }
  .btn-action:disabled {
    background: var(--surface-2); color: var(--text-hint); cursor: not-allowed;
    transform: none; opacity: 1;
  }

  .btn-confirm-sm {
    flex-shrink: 0;
    background: var(--primary-light); color: var(--primary);
    border: none; border-radius: var(--radius-sm);
    padding: 0 18px;
    font-size: 13px; font-weight: 700;
    font-family: 'Nanum Square Neo', sans-serif;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-confirm-sm:hover  { opacity: 0.8; transform: translateY(-1px); }
  .btn-confirm-sm:active { transform: scale(0.97); }

  /* ── Timer ── */
  .timer {
    font-size: 12px; color: var(--primary); font-weight: 700;
    margin-top: 6px; padding-left: 2px;
    display: flex; align-items: center; gap: 4px;
  }

  /* ── OTP error ── */
  .otp-error {
    display: flex; align-items: center; gap: 6px;
    margin-top: 7px; padding-left: 2px;
    opacity: 0; transform: translateY(-3px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .otp-error.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .otp-error span {
    font-size: 12px; font-weight: 700; color: var(--danger);
  }

  /* ── Info card ── */
  .info-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 18px; margin-top: 24px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .info-icon {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .info-text {
    font-size: 12px; color: var(--text-sub);
    line-height: 1.65; font-weight: 400; word-break: keep-all;
  }
  .info-text strong { color: var(--text-main); font-weight: 700; }

  /* ── 아이디 찾기 링크 ── */
  .find-id-row {
    display: flex; justify-content: center; margin-top: 16px;
  }
  .link-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Nanum Square Neo', sans-serif;
    font-size: 12.5px; font-weight: 400;
    color: var(--text-sub); text-decoration: none;
    padding: 2px 4px; transition: color 0.15s;
  }
  .link-btn:hover { color: var(--primary); }

  /* ── CTA 다음으로 ── */
  .cta-wrap { padding: 24px 24px 32px; }
  .btn-cta {
    width: 100%;
    background: #E8E5E1; color: #B0ABB5;
    border: none; border-radius: var(--radius);
    padding: 17px;
    font-size: 15px; font-weight: 800;
    font-family: 'Nanum Square Neo', sans-serif;
    cursor: default;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.22s, color 0.22s, transform 0.12s, box-shadow 0.22s;
  }
  .btn-cta.active {
    background: var(--primary); color: #fff; cursor: pointer;
  }
  .btn-cta.active:hover  { box-shadow: 0 8px 24px rgba(150,134,191,0.30); transform: translateY(-1px); }
  .btn-cta.active:active { transform: scale(0.98); box-shadow: none; }

  /* ── Home indicator ── */
  .home-indicator {
    width: 120px; height: 4px;
    background: var(--text-main); border-radius: 3px;
    margin: 0 auto 16px; opacity: 0.15;
  }

  /* ── Verified badge on phone ── */
  .verified-badge {
    display: none;
    align-items: center; gap: 5px;
    margin-top: 7px; padding-left: 2px;
    font-size: 12px; font-weight: 700; color: var(--green);
  }
  .verified-badge.show { display: flex; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .step-label  { animation: fadeUp 0.4s ease 0.05s both; }
  .title       { animation: fadeUp 0.4s ease 0.10s both; }
  .subtitle    { animation: fadeUp 0.4s ease 0.14s both; }
  .form-group  { animation: fadeUp 0.4s ease 0.18s both; }
  .info-card   { animation: fadeUp 0.4s ease 0.28s both; }
  .find-id-row { animation: fadeUp 0.4s ease 0.30s both; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" fill="none" viewBox="0 0 17 12">
        <rect x="0"    y="3"   width="3" height="9"    rx="1" fill="#1C1A1F" opacity=".3"/>
        <rect x="4.5"  y="2"   width="3" height="10"   rx="1" fill="#1C1A1F" opacity=".5"/>
        <rect x="9"    y="0.5" width="3" height="11.5" rx="1" fill="#1C1A1F" opacity=".75"/>
        <rect x="13.5" y="0"   width="3" height="12"   rx="1" fill="#1C1A1F"/>
      </svg>
      <svg width="16" height="12" fill="none" viewBox="0 0 16 12">
        <path d="M8 3C10.2 3 12.2 3.9 13.6 5.4L15 4C13.2 2.1 10.7 1 8 1C5.3 1 2.8 2.1 1 4L2.4 5.4C3.8 3.9 5.8 3 8 3Z" fill="#1C1A1F"/>
        <path d="M8 6C9.5 6 10.8 6.6 11.8 7.6L13.2 6.2C11.8 4.8 9.9 4 8 4C6.1 4 4.2 4.8 2.8 6.2L4.2 7.6C5.2 6.6 6.5 6 8 6Z" fill="#1C1A1F" opacity=".6"/>
        <circle cx="8" cy="10.5" r="1.5" fill="#1C1A1F"/>
      </svg>
      <svg width="27" height="13" fill="none" viewBox="0 0 27 13">
        <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="#1C1A1F" stroke-opacity=".3"/>
        <rect x="2"   y="2"   width="18" height="9"  rx="2"   fill="#1C1A1F"/>
        <path d="M24.5 4.5v4C25.6 8 26.5 7.1 26.5 6.5S25.6 5 24.5 4.5Z" fill="#1C1A1F" opacity=".35"/>
      </svg>
    </div>
  </div>

  <!-- App header -->
  <div class="app-header">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5L2.5 4.7v6.6L8 14.5l5.5-3.2V4.7L8 1.5Z" stroke="white" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="8" cy="8" r="2" fill="white"/>
      </svg>
    </div>
    <span class="app-name">녹차</span>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-back" onclick="history.back()">
      <svg width="18" height="18" fill="none" viewBox="0 0 18 18">
        <path d="M11 13.5L6.5 9L11 4.5" stroke="#1C1A1F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <span class="step-label">비밀번호 재설정</span>
    <h1 class="title">번호 인증으로<br>본인을 확인해요</h1>
    <p class="subtitle">가입 시 등록한 아이디와 휴대폰 번호로<br>본인 인증을 진행합니다.</p>

    <!-- ① 아이디 입력 -->
    <div class="form-group">
      <label class="field-label">아이디</label>
      <div class="field-wrap">
        <span class="field-icon">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="5.5" r="2.8" stroke="#ADA8B2" stroke-width="1.3"/>
            <path d="M1.5 13.5c0-3 2.7-5 6-5s6 2 6 5" stroke="#ADA8B2" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </span>
        <input class="input-solo" type="text" id="inp-id"
          placeholder="가입한 아이디를 입력하세요"
          autocomplete="username" spellcheck="false"
          oninput="onIdInput()"/>
      </div>
    </div>

    <!-- ② 핸드폰 번호 + 인증 버튼 -->
    <div class="form-group">
      <label class="field-label">휴대폰 번호</label>
      <div class="input-row">
        <div class="input-wrap">
          <span class="flag">🇰🇷</span>
          <div class="divider-v"></div>
          <input class="tel-input" type="tel" id="inp-phone"
            placeholder="010-0000-0000" maxlength="13"
            oninput="formatPhone(this); onPhoneInput()">
        </div>
        <button class="btn-action" id="btn-send" onclick="sendCode()" disabled>인증</button>
      </div>
      <!-- 인증 완료 뱃지 -->
      <div class="verified-badge" id="verified-badge">
        <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
          <path d="M1 5L5 8.5L12 1.5" stroke="#8BBFA8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        핸드폰 번호 인증 완료
      </div>
    </div>

    <!-- ③ 인증번호 + 확인 버튼 -->
    <div class="form-group" id="otp-group" style="opacity:0.4; pointer-events:none; transition: opacity 0.3s;">
      <label class="field-label">인증번호</label>
      <div class="input-row">
        <div class="input-wrap" id="otp-wrap">
          <input class="otp-input" type="text" id="inp-otp"
            placeholder="6자리 입력" maxlength="6"
            inputmode="numeric" oninput="onOtpInput()">
        </div>
        <button class="btn-confirm-sm" id="btn-verify-otp" onclick="verifyOtp()">확인</button>
      </div>

      <!-- 타이머 -->
      <div class="timer" id="timer" style="display:none">
        <svg width="12" height="12" fill="none" viewBox="0 0 12 12">
          <circle cx="6" cy="6" r="5" stroke="#9686BF" stroke-width="1.2"/>
          <path d="M6 3.5V6L7.5 7.5" stroke="#9686BF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span id="timer-text">02:59</span>
      </div>

      <!-- 인증번호 오류 -->
      <div class="otp-error" id="otp-error">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="#BF9696" stroke-width="1.2"/>
          <path d="M6.5 4v3M6.5 8.5v.1" stroke="#BF9696" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <span>인증번호가 틀렸습니다</span>
      </div>
    </div>

    <!-- ④ 안내 카드 -->
    <div class="info-card">
      <div class="info-icon">
        <svg width="9" height="9" fill="none" viewBox="0 0 9 9">
          <path d="M4.5 2V4.5M4.5 6.5V6.6" stroke="#9686BF" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="info-text">
        <strong>비밀번호 재설정</strong>을 위한 휴대폰 번호 인증을 진행합니다.<br>
        가입 시 사용한 아이디와 번호가 일치해야 합니다.
      </p>
    </div>

    <!-- ⑤ 아이디 잊으셨나요? -->
    <div class="find-id-row">
      <a class="link-btn" href="account_result.html">아이디를 잊으셨나요?</a>
    </div>

  </div>

  <!-- 다음으로 버튼 -->
  <div class="cta-wrap">
    <button class="btn-cta" id="btn-next" onclick="goNext()">
      다음으로
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="home-indicator"></div>
</div>

<script>
  /* ─────────────────────────────────────────
     더미 유저 테이블 (실제 서비스: API 교체)
  ───────────────────────────────────────── */
  const USER_TABLE = [
    { userId: 'nokcha',   phone: '01012345678' },
    { userId: 'greentea', phone: '01098765432' },
    { userId: 'testuser', phone: '01011112222' },
  ];

  /* 더미 OTP (실제: SMS API 발송 후 서버 검증) */
  const DUMMY_OTP = '123456';

  let timerInterval = null;
  let seconds = 179;
  let otpVerified = false;
  let verifiedPhone = '';

  /* ── 전화번호 포맷 ── */
  function formatPhone(input) {
    let v = input.value.replace(/\D/g, '');
    if      (v.length <= 3) input.value = v;
    else if (v.length <= 7) input.value = v.slice(0,3) + '-' + v.slice(3);
    else                    input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
  }

  /* ── 아이디 입력 → 인증 버튼 활성화 조건 체크 ── */
  function onIdInput() {
    checkSendBtn();
  }

  /* ── 폰 입력 → 인증 버튼 활성화 조건 체크 ── */
  function onPhoneInput() {
    checkSendBtn();
    /* 번호 바꾸면 인증 초기화 */
    if (otpVerified) {
      otpVerified = false;
      document.getElementById('verified-badge').classList.remove('show');
      document.getElementById('btn-next').classList.remove('active');
      setOtpGroup(false);
    }
  }

  function checkSendBtn() {
    const idOk    = document.getElementById('inp-id').value.trim().length > 0;
    const phoneOk = document.getElementById('inp-phone').value.replace(/\D/g,'').length >= 10;
    document.getElementById('btn-send').disabled = !(idOk && phoneOk);
  }

  /* ── 인증번호 발송 ── */
  function sendCode() {
    const phoneRaw = document.getElementById('inp-phone').value.replace(/\D/g,'');
    if (phoneRaw.length < 10) return;

    /* OTP 그룹 활성화 */
    setOtpGroup(true);
    document.getElementById('timer').style.display = 'flex';
    document.getElementById('otp-error').classList.remove('show');
    document.getElementById('inp-otp').value = '';

    /* 타이머 시작 */
    seconds = 179;
    clearInterval(timerInterval);
    updateTimer();
    timerInterval = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(timerInterval);
        document.getElementById('timer-text').textContent = '만료됨';
      } else updateTimer();
    }, 1000);

    /* 실제 서비스: SMS API 호출 */
    /* await fetch('/api/send-otp', { method:'POST', body: JSON.stringify({ phone: phoneRaw }) }); */
    console.log('📱 OTP 발송 (더미: ' + DUMMY_OTP + ')');
  }

  /* ── 타이머 ── */
  function updateTimer() {
    const m = String(Math.floor(seconds/60)).padStart(2,'0');
    const s = String(seconds%60).padStart(2,'0');
    document.getElementById('timer-text').textContent = m + ':' + s;
  }

  /* ── OTP 입력 → 오류 메시지 자동 숨김 ── */
  function onOtpInput() {
    document.getElementById('otp-error').classList.remove('show');
    /* otp-wrap 테두리 초기화 */
    document.getElementById('otp-wrap').style.outlineColor = '';
  }

  /* ── OTP 확인 ── */
  function verifyOtp() {
    const otp   = document.getElementById('inp-otp').value.trim();
    const wrap  = document.getElementById('otp-wrap');

    if (otp === DUMMY_OTP) {
      /* 성공 */
      otpVerified = true;
      verifiedPhone = document.getElementById('inp-phone').value.replace(/\D/g,'');
      clearInterval(timerInterval);
      document.getElementById('timer').style.display = 'none';
      document.getElementById('otp-error').classList.remove('show');
      wrap.style.outlineColor = 'var(--green)';
      document.getElementById('verified-badge').classList.add('show');
      document.getElementById('btn-next').classList.add('active');
    } else {
      /* 실패 */
      otpVerified = false;
      wrap.style.outlineColor = '#D4A9A9';
      document.getElementById('otp-error').classList.add('show');
      document.getElementById('inp-otp').value = '';
      document.getElementById('btn-next').classList.remove('active');
    }
  }

  /* ── OTP 그룹 활성/비활성 ── */
  function setOtpGroup(active) {
    const g = document.getElementById('otp-group');
    g.style.opacity       = active ? '1'    : '0.4';
    g.style.pointerEvents = active ? 'auto' : 'none';
  }

  /* ── 다음으로 (유저 검증 후 이동) ── */
  function goNext() {
    if (!document.getElementById('btn-next').classList.contains('active')) return;

    const inputId    = document.getElementById('inp-id').value.trim().toLowerCase();
    const inputPhone = verifiedPhone;

    /* 1. 핸드폰번호가 테이블에 있는지 확인 */
    const byPhone = USER_TABLE.find(u => u.phone === inputPhone);
    if (!byPhone) {
      alert('가입 정보가 없습니다. 고객센터로 문의 바랍니다.');
      /* window.location.href = 'login.html'; */
      return;
    }

    /* 2. 아이디 + 핸드폰번호 둘 다 일치하는지 확인 */
    const matched = USER_TABLE.find(u => u.userId.toLowerCase() === inputId && u.phone === inputPhone);
    if (!matched) {
      alert('가입 정보와 맞지 않습니다. 고객센터 문의 바랍니다.\n(번호 변경, 아이디 오류 등)');
      /* window.location.href = 'login.html'; */
      return;
    }

    /* 3. 검증 완료 → 비밀번호 재설정 화면 이동 */
    /* window.location.href = 'reset_password.html?userId=' + matched.userId; */
    alert('✅ 본인 확인 완료!\n비밀번호 재설정 화면으로 이동합니다.');
  }
</script>
</body>
